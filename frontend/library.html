<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>Library | E-Bundle Ethiopia</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome -->
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet" />

    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+Ethiopic:wght@400;500;700&display=swap"
      rel="stylesheet" />

    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "Noto Sans Ethiopic", "sans-serif"],
            },
            colors: {
              primary: "#4F46E5",
              secondary: "#7C3AED",
              accent: "#EC4899",
              success: "#10B981",
              warning: "#F59E0B",
            },
          },
        },
      };
    </script>

    <style>
      body {
        background-color: #0f172a;
        color: #f8fafc;
        font-family: "Inter", "Noto Sans Ethiopic", sans-serif;
      }

      .glass {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      .glass-card {
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.05) 0%,
          rgba(255, 255, 255, 0.01) 100%
        );
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.05);
        transition: all 0.3s ease;
      }

      .glass-card:hover {
        border-color: rgba(79, 70, 229, 0.3);
        transform: translateY(-2px);
      }

      .blob {
        position: absolute;
        filter: blur(60px);
        opacity: 0.3;
        animation: blob 7s infinite;
      }

      @keyframes blob {
        0% {
          transform: translate(0px, 0px) scale(1);
        }
        33% {
          transform: translate(30px, -50px) scale(1.1);
        }
        66% {
          transform: translate(-20px, 20px) scale(0.9);
        }
        100% {
          transform: translate(0px, 0px) scale(1);
        }
      }

      .animation-delay-2000 {
        animation-delay: 2s;
      }

      .animation-delay-4000 {
        animation-delay: 4s;
      }

      .course-card {
        transition: all 0.3s ease;
      }

      .course-card:hover {
        transform: translateY(-4px);
      }

      .progress-bar {
        height: 4px;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 2px;
        overflow: hidden;
      }

      .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, #4f46e5, #7c3aed);
        transition: width 0.3s ease;
      }

      .progress-fill.completed {
        background: linear-gradient(90deg, #10b981, #34d399);
      }

      .tab-btn.active {
        background: linear-gradient(
          135deg,
          rgba(79, 70, 229, 0.2),
          rgba(124, 58, 237, 0.2)
        );
        color: white;
        border: 1px solid rgba(79, 70, 229, 0.5);
      }

      .search-input:focus {
        border-color: rgba(79, 70, 229, 0.5);
      }

      .fade-in {
        animation: fadeIn 0.5s ease-out;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .subject-badge {
        background: rgba(79, 70, 229, 0.2);
        border: 1px solid rgba(79, 70, 229, 0.3);
        padding: 4px 10px;
        border-radius: 20px;
        font-size: 11px;
        font-weight: 600;
      }
    </style>
  </head>
  <body
    class="antialiased min-h-screen relative selection:bg-primary selection:text-white">
    <!-- Animated Background -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
      <div class="blob bg-primary w-72 h-72 rounded-full top-0 left-0"></div>
      <div
        class="blob bg-secondary w-96 h-96 rounded-full bottom-0 right-0 animation-delay-2000"></div>
      <div
        class="blob bg-accent w-64 h-64 rounded-full top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 animation-delay-4000"></div>
    </div>

    <!-- Navbar -->
    <nav
      class="w-full glass border-b border-white/10 px-6 py-4 flex justify-between items-center sticky top-0 z-50">
      <div
        class="flex items-center space-x-3 cursor-pointer"
        onclick="window.location.href = 'dashboard.html'">
        <div
          class="w-10 h-10 bg-gradient-to-br from-primary to-secondary rounded-xl flex items-center justify-center">
          <i class="fas fa-graduation-cap text-white text-lg"></i>
        </div>
        <span class="text-xl font-bold hidden sm:block">E-Bundle</span>
      </div>

      <div class="hidden md:flex items-center space-x-1">
        <a
          href="dashboard.html"
          class="nav-btn px-4 py-2 rounded-lg text-gray-300 hover:text-white hover:bg-white/10 transition-all flex items-center space-x-2">
          <i class="fas fa-home"></i><span>Dashboard</span>
        </a>
        <a
          href="library.html"
          class="nav-btn px-4 py-2 rounded-lg text-white bg-white/10 transition-all flex items-center space-x-2">
          <i class="fas fa-book"></i><span>Library</span>
        </a>
        <a
          href="ai-tutor.html"
          class="nav-btn px-4 py-2 rounded-lg text-gray-300 hover:text-white hover:bg-white/10 transition-all flex items-center space-x-2">
          <i class="fas fa-robot"></i><span>AI Tutor</span>
        </a>
        <a
          href="community.html"
          class="nav-btn px-4 py-2 rounded-lg text-gray-300 hover:text-white hover:bg-white/10 transition-all flex items-center space-x-2">
          <i class="fas fa-users"></i><span>Community</span>
        </a>
        <a
          href="kahoot.html"
          class="nav-btn px-4 py-2 rounded-lg text-gray-300 hover:text-white hover:bg-white/10 transition-all flex items-center space-x-2">
          <i class="fas fa-gamepad"></i><span>Kahoot</span>
        </a>
        <a
          href="video-chat.html"
          class="nav-btn px-4 py-2 rounded-lg text-gray-300 hover:text-white hover:bg-white/10 transition-all flex items-center space-x-2">
          <i class="fas fa-video"></i><span>Video Chat</span>
        </a>
      </div>

      <div class="flex items-center space-x-4">
        <div
          class="hidden sm:flex items-center space-x-2 bg-white/5 px-3 py-1.5 rounded-full border border-white/10">
          <i class="fas fa-book text-primary"></i>
          <span class="text-sm font-semibold">Library</span>
        </div>
        <div class="relative group">
          <div
            class="w-10 h-10 rounded-full bg-gradient-to-r from-primary to-secondary p-[2px] cursor-pointer">
            <img
              id="userAvatar"
              src="https://api.dicebear.com/7.x/avataaars/svg?seed=User"
              alt="Profile"
              class="w-full h-full rounded-full bg-slate-900" />
          </div>
          <div
            class="absolute right-0 mt-2 w-48 glass rounded-xl border border-white/10 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all transform origin-top-right z-50">
            <div class="p-2">
              <div
                class="px-4 py-2 text-sm text-gray-400 border-b border-white/10 mb-1">
                <span id="userNameDisplay">User</span>
              </div>
              <a
                href="profile.html"
                class="w-full text-left px-4 py-2 hover:bg-white/10 rounded-lg text-sm transition-colors block"
                >Profile</a
              >
              <hr class="border-white/10 my-2" />
              <button
                onclick="logout()"
                class="w-full text-left px-4 py-2 hover:bg-red-500/20 text-red-400 rounded-lg text-sm transition-colors">
                Logout
              </button>
            </div>
          </div>
        </div>
      </div>
    </nav>

    <!-- Toast Notifications -->
    <div id="toastContainer" class="fixed top-4 right-4 z-50 space-y-2"></div>

    <!-- Main Content -->
    <main class="relative z-10 p-6 max-w-7xl mx-auto">
      <section class="fade-in space-y-6">
        <!-- Header -->
        <div
          class="flex flex-col md:flex-row justify-between items-center gap-4">
          <div>
            <h2 class="text-3xl font-bold">Learning Library</h2>
            <p class="text-gray-400">Browse and access all your courses</p>
          </div>

          <!-- Search Bar -->
          <div class="relative w-full md:w-80 lg:w-96">
            <div class="glass rounded-xl p-0.5">
              <div class="relative flex items-center">
                <i
                  class="fas fa-search absolute left-4 text-gray-400 text-sm"></i>
                <input
                  type="text"
                  id="librarySearchInput"
                  placeholder="Search courses..."
                  class="search-input w-full bg-transparent py-2.5 pl-10 pr-10 rounded-xl text-white placeholder-gray-400 focus:outline-none text-sm"
                  autocomplete="off" />
                <button
                  id="clearSearchBtn"
                  class="absolute right-3 text-gray-400 hover:text-white transition-colors opacity-0 pointer-events-none"
                  onclick="clearSearch()">
                  <i class="fas fa-times-circle text-sm"></i>
                </button>
              </div>
            </div>
          </div>
        </div>

        <!-- Filters -->
        <div class="flex flex-wrap gap-3 items-center">
          <div class="glass p-1 rounded-xl flex flex-wrap gap-1">
            <button
              onclick="filterBySubject('all')"
              id="filter-all"
              class="filter-btn active px-3 py-1.5 rounded-lg text-sm font-medium transition-all">
              All
            </button>
            <button
              onclick="filterBySubject('math')"
              id="filter-math"
              class="filter-btn px-3 py-1.5 rounded-lg text-sm font-medium transition-all text-gray-400 hover:text-white">
              <i class="fas fa-calculator mr-1"></i>Math
            </button>
            <button
              onclick="filterBySubject('physics')"
              id="filter-physics"
              class="filter-btn px-3 py-1.5 rounded-lg text-sm font-medium transition-all text-gray-400 hover:text-white">
              <i class="fas fa-atom mr-1"></i>Physics
            </button>
            <button
              onclick="filterBySubject('chemistry')"
              id="filter-chemistry"
              class="filter-btn px-3 py-1.5 rounded-lg text-sm font-medium transition-all text-gray-400 hover:text-white">
              <i class="fas fa-flask mr-1"></i>Chemistry
            </button>
            <button
              onclick="filterBySubject('biology')"
              id="filter-biology"
              class="filter-btn px-3 py-1.5 rounded-lg text-sm font-medium transition-all text-gray-400 hover:text-white">
              <i class="fas fa-dna mr-1"></i>Biology
            </button>
            <button
              onclick="filterBySubject('english')"
              id="filter-english"
              class="filter-btn px-3 py-1.5 rounded-lg text-sm font-medium transition-all text-gray-400 hover:text-white">
              <i class="fas fa-book mr-1"></i>English
            </button>
            <button
              onclick="filterBySubject('history')"
              id="filter-history"
              class="filter-btn px-3 py-1.5 rounded-lg text-sm font-medium transition-all text-gray-400 hover:text-white">
              <i class="fas fa-landmark mr-1"></i>History
            </button>
          </div>

          <!-- Grade Filter -->
          <select
            id="gradeFilter"
            onchange="filterByGrade()"
            class="glass bg-transparent px-3 py-1.5 rounded-lg text-sm border border-white/10 focus:outline-none focus:border-primary">
            <option value="all">All Grades</option>
            <option value="9">Grade 9</option>
            <option value="10">Grade 10</option>
            <option value="11">Grade 11</option>
            <option value="12">Grade 12</option>
          </select>
        </div>

        <!-- Courses Grid -->
        <div
          id="coursesGrid"
          class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6">
          <div class="col-span-3 text-center py-12 text-gray-400">
            <i class="fas fa-spinner fa-spin text-3xl mb-3"></i>
            <p>Loading courses...</p>
          </div>
        </div>
      </section>
    </main>

    <script>
      // API Configuration
      const API_URL =
        window.location.hostname === "localhost" ?
          ""
        : "https://e-bundle.onrender.com";

      let authToken = localStorage.getItem("token");
      let allCourses = [];
      let currentSubject = "all";
      let currentGrade = "all";
      let currentSearchQuery = "";

      // Check if user is logged in
      if (!authToken) {
        showToast("Please login first", "error");
        setTimeout(() => {
          window.location.href = "login.html";
        }, 2000);
      }

      // Load user data
      async function loadUserData() {
        try {
          const response = await fetch(`${API_URL}/profile`, {
            headers: { Authorization: `Bearer ${authToken}` },
          });
          if (response.ok) {
            const data = await response.json();
            if (data.success && data.user) {
              document.getElementById("userNameDisplay").textContent =
                data.user.firstName || "User";
              if (data.user.avatar) {
                document.getElementById("userAvatar").src = data.user.avatar;
              }
            }
          }
        } catch (err) {
          console.error("Failed to load user:", err);
        }
      }

      function showToast(message, type = "info") {
        const container = document.getElementById("toastContainer");
        const toast = document.createElement("div");
        const colors =
          type === "error" ? "bg-red-500/20 border-red-500/50 text-red-400"
          : type === "success" ?
            "bg-green-500/20 border-green-500/50 text-green-400"
          : "bg-primary/20 border-primary/50 text-primary";

        toast.className = `px-4 py-3 rounded-xl glass border ${colors} text-sm flex items-center space-x-2 transform translate-x-full transition-transform duration-300`;
        toast.innerHTML = `<i class="fas ${
          type === "error" ? "fa-exclamation-circle"
          : type === "success" ? "fa-check-circle"
          : "fa-info-circle"
        }"></i><span>${message}</span>`;

        container.appendChild(toast);
        setTimeout(() => toast.classList.remove("translate-x-full"), 10);
        setTimeout(() => {
          toast.classList.add("translate-x-full");
          setTimeout(() => toast.remove(), 300);
        }, 3000);
      }

      // Load courses from API
      async function loadCourses() {
        try {
          const params = new URLSearchParams();
          if (currentSubject !== "all")
            params.append("subject", currentSubject);
          if (currentGrade !== "all") params.append("grade", currentGrade);
          if (currentSearchQuery) params.append("search", currentSearchQuery);

          const url = `${API_URL}/api/courses?${params.toString()}`;
          const response = await fetch(url, {
            headers: { Authorization: `Bearer ${authToken}` },
          });

          if (response.status === 401) {
            showToast("Session expired. Please login again.", "error");
            localStorage.removeItem("token");
            setTimeout(() => (window.location.href = "login.html"), 1500);
            return;
          }

          const data = await response.json();

          if (data.success) {
            allCourses = data.courses;
            renderCourses(allCourses);
          } else {
            throw new Error(data.message || "Failed to load courses");
          }
        } catch (err) {
          console.error("Load courses error:", err);
          document.getElementById("coursesGrid").innerHTML = `
            <div class="col-span-3 text-center py-12">
              <i class="fas fa-exclamation-circle text-5xl text-red-400 mb-4"></i>
              <p class="text-red-400">Failed to load courses. Please try again.</p>
              <button onclick="loadCourses()" class="mt-4 px-4 py-2 bg-primary rounded-lg hover:bg-primary/80 transition-colors">
                Retry
              </button>
            </div>
          `;
        }
      }

      function renderCourses(courses) {
        const grid = document.getElementById("coursesGrid");

        if (!courses || courses.length === 0) {
          grid.innerHTML = `
            <div class="col-span-3 text-center py-12">
              <i class="fas fa-book-open text-5xl text-gray-600 mb-4"></i>
              <p class="text-gray-400">No courses found</p>
              <p class="text-gray-500 text-sm mt-2">Try adjusting your filters or search</p>
            </div>
          `;
          return;
        }

        grid.innerHTML = courses
          .map((course) => {
            const progress = course.progress || 0;
            const isCompleted = progress === 100;
            const isStarted = progress > 0 && progress < 100;

            // Get icon based on subject
            const subjectIcons = {
              math: "fa-calculator",
              physics: "fa-atom",
              chemistry: "fa-flask",
              biology: "fa-dna",
              english: "fa-book",
              history: "fa-landmark",
              default: "fa-graduation-cap",
            };
            const icon = subjectIcons[course.subject] || subjectIcons.default;

            // Get color based on subject
            const subjectColors = {
              math: "from-blue-500 to-cyan-500",
              physics: "from-orange-500 to-red-500",
              chemistry: "from-green-500 to-emerald-500",
              biology: "from-purple-500 to-pink-500",
              english: "from-indigo-500 to-blue-500",
              history: "from-yellow-500 to-orange-500",
              default: "from-primary to-secondary",
            };
            const gradient =
              subjectColors[course.subject] || subjectColors.default;

            return `
            <div class="course-card glass-card rounded-2xl overflow-hidden cursor-pointer" 
                 onclick="viewCourse('${course.id}')">
              <div class="h-40 bg-gradient-to-br ${gradient} flex items-center justify-center relative overflow-hidden">
                <div class="absolute inset-0 bg-black/20"></div>
                <i class="fas ${icon} text-5xl text-white/80 relative z-10"></i>
                <div class="absolute top-3 right-3">
                  <span class="subject-badge text-xs">${course.subject.toUpperCase()}</span>
                </div>
                <div class="absolute bottom-3 left-3">
                  <span class="text-xs font-bold px-2 py-1 rounded-lg bg-black/50 text-white">Grade ${course.grade}</span>
                </div>
              </div>
              
              <div class="p-5">
                <h3 class="font-bold text-lg mb-2 line-clamp-1 group-hover:text-primary transition-colors">${escapeHtml(course.title)}</h3>
                <p class="text-sm text-gray-400 line-clamp-2 mb-3">${escapeHtml(course.description) || "No description available"}</p>
                
                <div class="flex justify-between items-center text-xs text-gray-500 mb-2">
                  <span><i class="fas fa-book-open mr-1"></i>${course.totalLessons} lessons</span>
                  <span>${Math.round(progress)}% complete</span>
                </div>
                
                <div class="progress-bar">
                  <div class="progress-fill ${isCompleted ? "completed" : ""}" style="width: ${progress}%"></div>
                </div>
                
                ${
                  isStarted ?
                    `
                  <div class="mt-3 flex items-center justify-between">
                    <span class="text-xs text-warning">${Math.round(progress)}% complete</span>
                    <span class="text-xs text-primary">Continue <i class="fas fa-arrow-right ml-1"></i></span>
                  </div>
                `
                  : isCompleted ?
                    `
                  <div class="mt-3">
                    <span class="text-xs text-success"><i class="fas fa-check-circle mr-1"></i>Completed</span>
                  </div>
                `
                  : `
                  <div class="mt-3">
                    <span class="text-xs text-primary">Start Learning <i class="fas fa-arrow-right ml-1"></i></span>
                  </div>
                `
                }
              </div>
            </div>
          `;
          })
          .join("");
      }

      function escapeHtml(text) {
        if (!text) return "";
        const div = document.createElement("div");
        div.textContent = text;
        return div.innerHTML;
      }

      function viewCourse(courseId) {
        window.location.href = `course-detail.html?id=${courseId}`;
      }

      function filterBySubject(subject) {
        currentSubject = subject;

        // Update active state on filter buttons
        document.querySelectorAll(".filter-btn").forEach((btn) => {
          btn.classList.remove(
            "active",
            "bg-primary/20",
            "text-white",
            "border",
            "border-primary/30",
          );
          btn.classList.add("text-gray-400");
        });

        const activeBtn = document.getElementById(`filter-${subject}`);
        if (activeBtn) {
          activeBtn.classList.add(
            "active",
            "bg-primary/20",
            "text-white",
            "border",
            "border-primary/30",
          );
          activeBtn.classList.remove("text-gray-400");
        } else {
          document
            .getElementById("filter-all")
            .classList.add(
              "active",
              "bg-primary/20",
              "text-white",
              "border",
              "border-primary/30",
            );
          document
            .getElementById("filter-all")
            .classList.remove("text-gray-400");
        }

        loadCourses();
      }

      function filterByGrade() {
        const gradeSelect = document.getElementById("gradeFilter");
        currentGrade = gradeSelect.value;
        loadCourses();
      }

      function filterBySearch() {
        const searchInput = document.getElementById("librarySearchInput");
        currentSearchQuery = searchInput.value.trim().toLowerCase();

        const clearBtn = document.getElementById("clearSearchBtn");
        if (currentSearchQuery) {
          clearBtn.classList.remove("opacity-0", "pointer-events-none");
          clearBtn.classList.add("opacity-100", "pointer-events-auto");
        } else {
          clearBtn.classList.remove("opacity-100", "pointer-events-auto");
          clearBtn.classList.add("opacity-0", "pointer-events-none");
        }

        loadCourses();
      }

      function clearSearch() {
        const searchInput = document.getElementById("librarySearchInput");
        searchInput.value = "";
        currentSearchQuery = "";
        filterBySearch();
        searchInput.focus();
        showToast("Search cleared", "info");
      }

      function logout() {
        localStorage.removeItem("token");
        localStorage.removeItem("user");
        showToast("Logged out successfully", "success");
        setTimeout(() => {
          window.location.href = "login.html";
        }, 1000);
      }

      // Event Listeners
      document.addEventListener("DOMContentLoaded", () => {
        loadUserData();
        loadCourses();

        const searchInput = document.getElementById("librarySearchInput");
        if (searchInput) {
          searchInput.addEventListener("input", filterBySearch);
        }
      });
    </script>
  </body>
</html>
