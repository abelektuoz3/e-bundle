<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>Library | E-Bundle Ethiopia</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome -->
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet" />

    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+Ethiopic:wght@400;500;700&display=swap"
      rel="stylesheet" />

    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "Noto Sans Ethiopic", "sans-serif"],
            },
            colors: {
              primary: "#4F46E5",
              secondary: "#7C3AED",
              accent: "#EC4899",
              success: "#10B981",
              warning: "#F59E0B",
            },
          },
        },
      };
    </script>

    <style>
      body {
        background-color: #0f172a;
        color: #f8fafc;
        font-family: "Inter", "Noto Sans Ethiopic", sans-serif;
      }

      .glass {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      .glass-card {
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.05) 0%,
          rgba(255, 255, 255, 0.01) 100%
        );
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.05);
        transition: all 0.3s ease;
      }

      .glass-card:hover {
        border-color: rgba(79, 70, 229, 0.3);
        transform: translateY(-2px);
      }

      .blob {
        position: absolute;
        filter: blur(60px);
        opacity: 0.3;
        animation: blob 7s infinite;
      }

      @keyframes blob {
        0% {
          transform: translate(0px, 0px) scale(1);
        }
        33% {
          transform: translate(30px, -50px) scale(1.1);
        }
        66% {
          transform: translate(-20px, 20px) scale(0.9);
        }
        100% {
          transform: translate(0px, 0px) scale(1);
        }
      }

      .animation-delay-2000 {
        animation-delay: 2s;
      }

      .animation-delay-4000 {
        animation-delay: 4s;
      }

      .media-card {
        transition: all 0.3s ease;
      }

      .media-card:hover {
        transform: translateY(-4px);
      }

      .progress-bar {
        height: 4px;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 2px;
        overflow: hidden;
      }

      .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, #4f46e5, #7c3aed);
        transition: width 0.3s ease;
      }

      .progress-fill.completed {
        background: linear-gradient(90deg, #10b981, #34d399);
      }

      .tab-btn.active {
        background: linear-gradient(
          135deg,
          rgba(79, 70, 229, 0.2),
          rgba(124, 58, 237, 0.2)
        );
        color: white;
        border: 1px solid rgba(79, 70, 229, 0.5);
      }

      .search-input:focus {
        border-color: rgba(79, 70, 229, 0.5);
      }

      .fade-in {
        animation: fadeIn 0.5s ease-out;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .type-badge {
        background: rgba(79, 70, 229, 0.2);
        border: 1px solid rgba(79, 70, 229, 0.3);
        padding: 4px 10px;
        border-radius: 20px;
        font-size: 11px;
        font-weight: 600;
      }

      .play-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        transition: opacity 0.3s ease;
      }

      .media-card:hover .play-overlay {
        opacity: 1;
      }

      .play-button {
        width: 50px;
        height: 50px;
        background: linear-gradient(135deg, #4f46e5, #7c3aed);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: transform 0.3s ease;
      }

      .play-button:hover {
        transform: scale(1.1);
      }

      .status-badge {
        position: absolute;
        top: 12px;
        right: 12px;
        padding: 4px 10px;
        border-radius: 20px;
        font-size: 11px;
        font-weight: 600;
        backdrop-filter: blur(8px);
        z-index: 10;
      }

      .status-completed {
        background: rgba(16, 185, 129, 0.9);
        color: white;
      }

      .status-in-progress {
        background: rgba(245, 158, 11, 0.9);
        color: white;
      }
    </style>
  </head>
  <body
    class="antialiased min-h-screen relative selection:bg-primary selection:text-white">
    <!-- Animated Background -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
      <div class="blob bg-primary w-72 h-72 rounded-full top-0 left-0"></div>
      <div
        class="blob bg-secondary w-96 h-96 rounded-full bottom-0 right-0 animation-delay-2000"></div>
      <div
        class="blob bg-accent w-64 h-64 rounded-full top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 animation-delay-4000"></div>
    </div>

    <!-- Navbar -->
    <nav
      class="w-full glass border-b border-white/10 px-4 md:px-6 py-4 flex justify-between items-center sticky top-0 z-50">
      <div
        class="flex items-center space-x-3 cursor-pointer"
        onclick="window.location.href = 'dashboard.html'">
        <div
          class="w-10 h-10 bg-gradient-to-br from-primary to-secondary rounded-xl flex items-center justify-center">
          <i class="fas fa-graduation-cap text-white text-lg"></i>
        </div>
        <span class="text-xl font-bold hidden sm:block">E-Bundle</span>
      </div>

      <div class="hidden md:flex items-center space-x-1">
        <a
          href="dashboard.html"
          class="nav-btn px-4 py-2 rounded-lg text-gray-300 hover:text-white hover:bg-white/10 transition-all flex items-center space-x-2">
          <i class="fas fa-home"></i><span>Dashboard</span>
        </a>
        <a
          href="library.html"
          class="nav-btn px-4 py-2 rounded-lg text-white bg-white/10 transition-all flex items-center space-x-2">
          <i class="fas fa-book"></i><span>Library</span>
        </a>
        <a
          href="ai-tutor.html"
          class="nav-btn px-4 py-2 rounded-lg text-gray-300 hover:text-white hover:bg-white/10 transition-all flex items-center space-x-2">
          <i class="fas fa-robot"></i><span>AI Tutor</span>
        </a>
        <a
          href="community.html"
          class="nav-btn px-4 py-2 rounded-lg text-gray-300 hover:text-white hover:bg-white/10 transition-all flex items-center space-x-2">
          <i class="fas fa-users"></i><span>Community</span>
        </a>
        <a
          href="kahoot.html"
          class="nav-btn px-4 py-2 rounded-lg text-gray-300 hover:text-white hover:bg-white/10 transition-all flex items-center space-x-2">
          <i class="fas fa-gamepad"></i><span>Kahoot</span>
        </a>
        <a
          href="video-chat.html"
          class="nav-btn px-4 py-2 rounded-lg text-gray-300 hover:text-white hover:bg-white/10 transition-all flex items-center space-x-2">
          <i class="fas fa-video"></i><span>Video Chat</span>
        </a>
      </div>

      <div class="flex items-center space-x-2 sm:space-x-4">
        <button
          id="mobileMenuBtn"
          class="md:hidden w-10 h-10 rounded-lg border border-white/10 hover:bg-white/10 transition-colors flex items-center justify-center"
          aria-label="Toggle menu"
          onclick="toggleMobileMenu()">
          <i class="fas fa-bars"></i>
        </button>
        <div
          class="hidden sm:flex items-center space-x-2 bg-white/5 px-3 py-1.5 rounded-full border border-white/10">
          <i class="fas fa-book text-primary"></i>
          <span class="text-sm font-semibold">Library</span>
        </div>
        <div class="relative group">
          <div
            class="w-10 h-10 rounded-full bg-gradient-to-r from-primary to-secondary p-[2px] cursor-pointer">
            <img
              id="userAvatar"
              src="https://api.dicebear.com/7.x/avataaars/svg?seed=User"
              alt="Profile"
              class="w-full h-full rounded-full bg-slate-900" />
          </div>
          <div
            class="absolute right-0 mt-2 w-48 glass rounded-xl border border-white/10 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all transform origin-top-right z-50">
            <div class="p-2">
              <div
                class="px-4 py-2 text-sm text-gray-400 border-b border-white/10 mb-1">
                <span id="userNameDisplay">User</span>
              </div>
              <a
                href="profile.html"
                class="w-full text-left px-4 py-2 hover:bg-white/10 rounded-lg text-sm transition-colors block"
                >Profile</a
              >
              <hr class="border-white/10 my-2" />
              <button
                onclick="logout()"
                class="w-full text-left px-4 py-2 hover:bg-red-500/20 text-red-400 rounded-lg text-sm transition-colors">
                Logout
              </button>
            </div>
          </div>
        </div>
      </div>
    </nav>
    <div
      id="mobileMenu"
      class="md:hidden hidden glass border-b border-white/10 px-4 py-3 space-y-2 relative z-40">
      <a href="dashboard.html" class="block px-3 py-2 rounded-lg hover:bg-white/10">Dashboard</a>
      <a href="library.html" class="block px-3 py-2 rounded-lg bg-white/10">Library</a>
      <a href="ai-tutor.html" class="block px-3 py-2 rounded-lg hover:bg-white/10">AI Tutor</a>
      <a href="community.html" class="block px-3 py-2 rounded-lg hover:bg-white/10">Community</a>
      <a href="kahoot.html" class="block px-3 py-2 rounded-lg hover:bg-white/10">Kahoot</a>
      <a href="video-chat.html" class="block px-3 py-2 rounded-lg hover:bg-white/10">Video Chat</a>
    </div>

    <!-- Toast Notifications -->
    <div id="toastContainer" class="fixed top-4 right-4 z-50 space-y-2"></div>

    <!-- Main Content -->
    <main class="relative z-10 p-6 max-w-7xl mx-auto">
      <section class="fade-in space-y-6">
        <!-- Header -->
        <div
          class="flex flex-col md:flex-row justify-between items-center gap-4">
          <div>
            <h2 class="text-3xl font-bold">Media Library</h2>
            <p class="text-gray-400">
              Browse and access all your learning materials
            </p>
          </div>

          <!-- Search Bar -->
          <div class="relative w-full md:w-80 lg:w-96">
            <div class="glass rounded-xl p-0.5">
              <div class="relative flex items-center">
                <i
                  class="fas fa-search absolute left-4 text-gray-400 text-sm"></i>
                <input
                  type="text"
                  id="librarySearchInput"
                  placeholder="Search by title..."
                  class="search-input w-full bg-transparent py-2.5 pl-10 pr-10 rounded-xl text-white placeholder-gray-400 focus:outline-none text-sm"
                  autocomplete="off" />
                <button
                  id="clearSearchBtn"
                  class="absolute right-3 text-gray-400 hover:text-white transition-colors opacity-0 pointer-events-none"
                  onclick="clearSearch()">
                  <i class="fas fa-times-circle text-sm"></i>
                </button>
              </div>
            </div>
          </div>
        </div>

        <!-- Type Filters -->
        <div class="flex flex-wrap gap-3 items-center">
          <div class="glass p-1 rounded-xl flex flex-wrap gap-1">
            <button
              onclick="filterByType('all')"
              id="filter-all"
              class="tab-btn active px-3 py-1.5 rounded-lg text-sm font-medium transition-all">
              All
            </button>
            <button
              onclick="filterByType('audio')"
              id="filter-audio"
              class="tab-btn px-3 py-1.5 rounded-lg text-sm font-medium transition-all text-gray-400 hover:text-white">
              <i class="fas fa-headphones mr-1"></i>Audio
            </button>
            <button
              onclick="filterByType('video')"
              id="filter-video"
              class="tab-btn px-3 py-1.5 rounded-lg text-sm font-medium transition-all text-gray-400 hover:text-white">
              <i class="fas fa-video mr-1"></i>Video
            </button>
            <button
              onclick="filterByType('pdf')"
              id="filter-pdf"
              class="tab-btn px-3 py-1.5 rounded-lg text-sm font-medium transition-all text-gray-400 hover:text-white">
              <i class="fas fa-file-pdf mr-1"></i>PDF
            </button>
          </div>
        </div>

        <!-- Media Grid -->
        <div
          id="mediaGrid"
          class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6">
          <div class="col-span-3 text-center py-12 text-gray-400">
            <i class="fas fa-spinner fa-spin text-3xl mb-3"></i>
            <p>Loading media...</p>
          </div>
        </div>
      </section>
    </main>

    <!-- Player Modal -->
    <div
      id="player-modal"
      class="fixed inset-0 z-50 hidden items-center justify-center modal-overlay p-4"
      style="background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(8px)">
      <div
        class="glass max-w-4xl w-full rounded-2xl p-6 relative border border-white/10">
        <div class="flex justify-between items-center mb-4">
          <div>
            <h3 id="player-title" class="text-xl font-bold"></h3>
            <p class="text-sm text-gray-400" id="player-status"></p>
          </div>
          <button
            onclick="closePlayer()"
            class="w-10 h-10 hover:bg-white/10 rounded-full flex items-center justify-center transition-colors text-gray-400 hover:text-white">
            <i class="fas fa-times text-xl"></i>
          </button>
        </div>
        <div id="player-container"></div>
        <div id="error-container"></div>

        <!-- Progress Tracking Controls -->
        <div class="mt-4 flex justify-between items-center">
          <div class="flex items-center space-x-4">
            <button
              id="markCompleteBtn"
              onclick="markMediaComplete()"
              class="px-4 py-2 bg-success/20 hover:bg-success/30 text-success border border-success/30 rounded-lg text-sm transition-colors flex items-center space-x-2">
              <i class="fas fa-check-circle"></i>
              <span>Mark as Complete</span>
            </button>
          </div>
          <div class="text-sm text-gray-400">
            Progress:
            <span id="watchProgress" class="text-primary font-bold">0%</span>
          </div>
        </div>
      </div>
    </div>

    <script>
      // API Configuration
      const API_URL =
        window.location.hostname === "localhost" ?
          ""
        : "https://e-bundle.onrender.com";

      let authToken = localStorage.getItem("token");
      let allMedia = [];
      let currentType = "all";
      let currentSearchQuery = "";

      // Player tracking variables
      let currentMediaId = null;
      let currentMediaType = null;
      let currentMediaTitle = null;
      let watchStartTime = null;
      let mediaProgress = {};
      let lastReportedProgress = 0;
      let currentVideoElement = null;
      let mobileMenuOpen = false;

      function toggleMobileMenu(force) {
        const menu = document.getElementById("mobileMenu");
        if (!menu) return;
        if (typeof force === "boolean") {
          mobileMenuOpen = force;
        } else {
          mobileMenuOpen = !mobileMenuOpen;
        }
        menu.classList.toggle("hidden", !mobileMenuOpen);
      }

      // Check if user is logged in
      if (!authToken) {
        showToast("Please login first", "error");
        setTimeout(() => {
          window.location.href = "login.html";
        }, 2000);
      }

      // Load user data
      async function loadUserData() {
        try {
          const response = await fetch(`${API_URL}/profile`, {
            headers: { Authorization: `Bearer ${authToken}` },
          });
          if (response.ok) {
            const data = await response.json();
            if (data.success && data.user) {
              document.getElementById("userNameDisplay").textContent =
                data.user.firstName || "User";
              if (data.user.avatar) {
                document.getElementById("userAvatar").src = data.user.avatar;
              }
            }
          }
        } catch (err) {
          console.error("Failed to load user:", err);
        }
      }

      // Load user progress
      async function loadUserProgress() {
        try {
          const response = await fetch(`${API_URL}/api/media-progress`, {
            headers: { Authorization: `Bearer ${authToken}` },
          });
          const data = await response.json();
          if (data.success) {
            mediaProgress = data.progress || {};
          }
        } catch (err) {
          console.error("Error loading progress:", err);
        }
      }

      function showToast(message, type = "info") {
        const container = document.getElementById("toastContainer");
        const toast = document.createElement("div");
        const colors =
          type === "error" ? "bg-red-500/20 border-red-500/50 text-red-400"
          : type === "success" ?
            "bg-green-500/20 border-green-500/50 text-green-400"
          : "bg-primary/20 border-primary/50 text-primary";

        toast.className = `px-4 py-3 rounded-xl glass border ${colors} text-sm flex items-center space-x-2 transform translate-x-full transition-transform duration-300`;
        toast.innerHTML = `<i class="fas ${
          type === "error" ? "fa-exclamation-circle"
          : type === "success" ? "fa-check-circle"
          : "fa-info-circle"
        }"></i><span>${message}</span>`;

        container.appendChild(toast);
        setTimeout(() => toast.classList.remove("translate-x-full"), 10);
        setTimeout(() => {
          toast.classList.add("translate-x-full");
          setTimeout(() => toast.remove(), 300);
        }, 3000);
      }

      // Load media from API
      async function loadMedia() {
        try {
          await loadUserProgress();

          const params = new URLSearchParams();
          if (currentType !== "all") params.append("type", currentType);
          if (currentSearchQuery) params.append("search", currentSearchQuery);

          const url = `${API_URL}/api/library/media?${params.toString()}`;
          const response = await fetch(url, {
            headers: { Authorization: `Bearer ${authToken}` },
          });

          if (response.status === 401) {
            showToast("Session expired. Please login again.", "error");
            localStorage.removeItem("token");
            setTimeout(() => (window.location.href = "login.html"), 1500);
            return;
          }

          const data = await response.json();

          if (data.success) {
            allMedia = data.media || [];
            renderMedia(allMedia);
          } else {
            throw new Error(data.message || "Failed to load media");
          }
        } catch (err) {
          console.error("Load media error:", err);
          document.getElementById("mediaGrid").innerHTML = `
            <div class="col-span-3 text-center py-12">
              <i class="fas fa-exclamation-circle text-5xl text-red-400 mb-4"></i>
              <p class="text-red-400">Failed to load media. Please try again.</p>
              <button onclick="loadMedia()" class="mt-4 px-4 py-2 bg-primary rounded-lg hover:bg-primary/80 transition-colors">
                Retry
              </button>
            </div>
          `;
        }
      }

      function getTypeStyles(type) {
        const styles = {
          video: {
            gradient: "from-red-500 to-orange-500",
            icon: "fa-play-circle",
            iconColor: "text-red-400",
            label: "Video",
          },
          audio: {
            gradient: "from-green-500 to-emerald-500",
            icon: "fa-headphones",
            iconColor: "text-green-400",
            label: "Audio",
          },
          pdf: {
            gradient: "from-orange-500 to-yellow-500",
            icon: "fa-file-pdf",
            iconColor: "text-orange-400",
            label: "PDF",
          },
        };
        return styles[type] || styles.pdf;
      }

      function renderMedia(mediaList) {
        const grid = document.getElementById("mediaGrid");

        if (!mediaList || mediaList.length === 0) {
          grid.innerHTML = `
            <div class="col-span-3 text-center py-12">
              <i class="fas fa-folder-open text-5xl text-gray-600 mb-4"></i>
              <p class="text-gray-400">No media found</p>
              <p class="text-gray-500 text-sm mt-2">Try adjusting your filters or search</p>
            </div>
          `;
          return;
        }

        grid.innerHTML = mediaList
          .map((item) => {
            const styles = getTypeStyles(item.type);
            const progress = mediaProgress[item.id] || 0;
            const isCompleted = progress === 100;
            const isStarted = progress > 0 && progress < 100;

            let statusBadge = "";
            if (isCompleted) {
              statusBadge = `<span class="status-badge status-completed"><i class="fas fa-check mr-1"></i>Done</span>`;
            } else if (isStarted) {
              statusBadge = `<span class="status-badge status-in-progress"><i class="fas fa-spinner mr-1"></i>${Math.round(progress)}%</span>`;
            }

            return `
              <div class="media-card glass-card rounded-2xl overflow-hidden cursor-pointer" 
                   onclick="playMedia('${item.id}', '${item.fileId || ""}', '${item.type}', '${item.url}', '${escapeHtml(item.title)}')">

                <div class="h-40 bg-gradient-to-br ${styles.gradient} flex items-center justify-center relative overflow-hidden">
                  <div class="absolute inset-0 bg-black/20"></div>
                  <i class="fas ${styles.icon} text-5xl text-white/80 relative z-10"></i>
                  
                  <div class="play-overlay">
                    <div class="play-button">
                      <i class="fas ${isCompleted ? "fa-redo" : "fa-play"} text-white text-xl ml-1"></i>
                    </div>
                  </div>
                  
                  ${statusBadge}
                  
                  <div class="absolute top-3 left-3">
                    <span class="type-badge text-xs">${styles.label}</span>
                  </div>
                </div>
                
                <div class="p-5">
                  <h3 class="font-bold text-lg mb-2 line-clamp-2 group-hover:text-primary transition-colors">${escapeHtml(item.title)}</h3>
                  <p class="text-sm text-gray-400 line-clamp-2 mb-3">${escapeHtml(item.description) || "No description available"}</p>
                  
                  <div class="flex justify-between items-center text-xs text-gray-500 mb-2">
                    <span><i class="fas fa-database mr-1"></i>${item.size || "Unknown size"}</span>
                    <span>${Math.round(progress)}% complete</span>
                  </div>
                  
                  <div class="progress-bar">
                    <div class="progress-fill ${isCompleted ? "completed" : ""}" style="width: ${progress}%"></div>
                  </div>
                  
                  ${
                    isStarted ?
                      `
                    <div class="mt-3 flex items-center justify-between">
                      <span class="text-xs text-warning">${Math.round(progress)}% complete</span>
                      <span class="text-xs text-primary">Continue <i class="fas fa-arrow-right ml-1"></i></span>
                    </div>
                  `
                    : isCompleted ?
                      `
                    <div class="mt-3">
                      <span class="text-xs text-success"><i class="fas fa-check-circle mr-1"></i>Completed</span>
                    </div>
                  `
                    : `
                    <div class="mt-3">
                      <span class="text-xs text-primary">Start Learning <i class="fas fa-arrow-right ml-1"></i></span>
                    </div>
                  `
                  }
                </div>
              </div>
            `;
          })
          .join("");
      }

      function escapeHtml(text) {
        if (!text) return "";
        const div = document.createElement("div");
        div.textContent = text;
        return div.innerHTML;
      }

      // ==========================================
      // PLAYER FUNCTIONS
      // ==========================================
      async function playMedia(id, fileId, type, url, title) {
        const modal = document.getElementById("player-modal");
        const container = document.getElementById("player-container");
        const errorContainer = document.getElementById("error-container");

        errorContainer.innerHTML = "";
        document.getElementById("player-title").textContent = title;
        await startMediaTracking(id, type, title);

        const streamTarget = fileId || id;
        const streamUrl = `${API_URL}/api/media/stream/${streamTarget}?token=${encodeURIComponent(authToken)}`;

        if (type === "video") {
          container.innerHTML = `
            <div class="relative rounded-xl overflow-hidden bg-black">
              <video id="activeVideo" controls class="w-full max-h-[70vh]" autoplay crossorigin="anonymous" playsinline ontimeupdate="updateVideoProgress(this)" onended="onMediaEnded('${id}')" onerror="handleMediaError(this, '${type}')">
                <source src="${streamUrl}">
                Your browser does not support video.
              </video>
            </div>
          `;
          currentVideoElement = document.getElementById("activeVideo");
        } else if (type === "audio") {
          container.innerHTML = `
            <div class="flex flex-col items-center justify-center p-8 bg-gradient-to-br from-slate-800 to-slate-900 rounded-xl border border-white/10">
              <div class="w-24 h-24 rounded-full bg-gradient-to-br from-green-500 to-emerald-500 flex items-center justify-center mb-6 shadow-lg shadow-green-500/20">
                <i class="fas fa-music text-white text-4xl"></i>
              </div>
              <h4 class="text-xl font-bold mb-2">${escapeHtml(title)}</h4>
              <p class="text-gray-400 mb-6">Audio Lesson</p>
              <audio id="activeAudio" controls class="w-full max-w-md" autoplay crossorigin="anonymous" ontimeupdate="updateAudioProgress(this)" onended="onMediaEnded('${id}')" onerror="handleMediaError(this, '${type}')">
                <source src="${streamUrl}">
                Your browser does not support audio.
              </audio>
            </div>
          `;
          currentVideoElement = document.getElementById("activeAudio");
        } else if (type === "pdf") {
          container.innerHTML = `
            <div id="pdf-container" class="w-full h-96 bg-slate-800 rounded-xl flex items-center justify-center border border-white/10">
              <div class="text-center"><i class="fas fa-spinner fa-spin text-4xl text-primary mb-4"></i><p class="text-gray-400">Loading PDF...</p></div>
            </div>
            <div class="mt-4 flex justify-between items-center">
              <div class="flex gap-2">
                <a href="${streamUrl}" target="_blank" class="px-4 py-2 bg-primary hover:bg-primary/80 rounded-lg text-sm transition-colors flex items-center"><i class="fas fa-external-link-alt mr-2"></i>Open in New Tab</a>
                <a href="${streamUrl.split("?")[0]}&download=1" download class="px-4 py-2 bg-white/10 hover:bg-white/20 rounded-lg text-sm transition-colors flex items-center"><i class="fas fa-download mr-2"></i>Download</a>
              </div>
            </div>
          `;
          currentVideoElement = null;
          await trackMediaProgress(id, 50, false);

          const blobUrl = `${streamUrl}&download=1`;
          document.getElementById("pdf-container").innerHTML =
            `<iframe src="${blobUrl}" class="w-full h-full rounded-xl" type="application/pdf"></iframe>`;
        }

        modal.classList.remove("hidden");
        modal.classList.add("flex");
      }

      async function startMediaTracking(mediaId, mediaType, title) {
        currentMediaId = mediaId;
        currentMediaType = mediaType;
        currentMediaTitle = title;
        watchStartTime = Date.now();
        lastReportedProgress = 0;

        const currentProgress = mediaProgress[mediaId] || 0;
        document.getElementById("watchProgress").textContent =
          `${Math.round(currentProgress)}%`;

        const btn = document.getElementById("markCompleteBtn");
        if (currentProgress === 100) {
          btn.innerHTML = '<i class="fas fa-check"></i><span>Completed</span>';
          btn.classList.add("opacity-50", "cursor-not-allowed");
          btn.disabled = true;
        } else {
          btn.innerHTML =
            '<i class="fas fa-check-circle"></i><span>Mark as Complete</span>';
          btn.classList.remove("opacity-50", "cursor-not-allowed");
          btn.disabled = false;
        }

        try {
          await fetch(`${API_URL}/log-activity`, {
            method: "POST",
            headers: {
              Authorization: `Bearer ${authToken}`,
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              type: "lesson",
              title: `Started ${mediaType}: ${title}`,
              description: `Opened ${mediaType} content`,
              xp: 5,
            }),
          });
        } catch (err) {
          console.error("Error logging activity:", err);
        }
      }

      async function trackMediaProgress(
        mediaId,
        progressPercent,
        completed = false,
      ) {
        try {
          const response = await fetch(`${API_URL}/api/track-media`, {
            method: "POST",
            headers: {
              Authorization: `Bearer ${authToken}`,
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              mediaId: mediaId,
              mediaType: currentMediaType,
              progress: progressPercent,
              completed: completed,
              timeSpent: Math.floor((Date.now() - watchStartTime) / 60000),
            }),
          });

          if (response.ok) {
            mediaProgress[mediaId] = completed ? 100 : progressPercent;
            document.getElementById("watchProgress").textContent =
              `${Math.round(progressPercent)}%`;
            if (completed) {
              const btn = document.getElementById("markCompleteBtn");
              btn.innerHTML =
                '<i class="fas fa-check"></i><span>Completed</span>';
              btn.classList.add("opacity-50", "cursor-not-allowed");
              btn.disabled = true;
              showToast("Media marked as complete!", "success");
              loadMedia();
            }
          }
        } catch (err) {
          console.error("Error tracking progress:", err);
        }
      }

      async function markMediaComplete() {
        if (!currentMediaId) return;
        await trackMediaProgress(currentMediaId, 100, true);
      }

      async function updateVideoProgress(videoElement) {
        if (!videoElement || !currentMediaId) return;
        const current = videoElement.currentTime,
          duration = videoElement.duration || 0;
        if (duration === 0) return;
        const percent = (current / duration) * 100;
        document.getElementById("watchProgress").textContent =
          `${Math.round(percent)}%`;
        const threshold = Math.floor(percent / 10) * 10;
        if (threshold > lastReportedProgress || percent >= 95) {
          lastReportedProgress = threshold;
          await trackMediaProgress(currentMediaId, percent, percent >= 95);
        }
      }

      async function updateAudioProgress(audioElement) {
        if (!audioElement || !currentMediaId) return;
        const current = audioElement.currentTime,
          duration = audioElement.duration || 0;
        if (duration === 0) return;
        const percent = (current / duration) * 100;
        document.getElementById("watchProgress").textContent =
          `${Math.round(percent)}%`;
        const threshold = Math.floor(percent / 10) * 10;
        if (threshold > lastReportedProgress || percent >= 95) {
          lastReportedProgress = threshold;
          await trackMediaProgress(currentMediaId, percent, percent >= 95);
        }
      }

      async function onMediaEnded(mediaId) {
        showToast("Content finished! Marking as complete...", "success");
        await trackMediaProgress(mediaId, 100, true);
        loadMedia();
      }

      function handleMediaError(mediaElement, type) {
        if (mediaElement.error && mediaElement.error.code === 4) return;
        const errorMessages = {
          1: "Playback was aborted",
          2: "Network error - please check your connection",
          3: "Decode error - file may be corrupted",
          4: "Format not supported by your browser",
        };
        const code = mediaElement.error ? mediaElement.error.code : "unknown";
        const message = errorMessages[code] || "Unknown playback error";
        const errorContainer = document.getElementById("error-container");
        errorContainer.innerHTML = `<div class="error-message flex items-center space-x-3 mt-4"><i class="fas fa-exclamation-circle text-red-400"></i><span>${message}</span></div>`;
      }

      function closePlayer() {
        const modal = document.getElementById("player-modal"),
          container = document.getElementById("player-container");
        const media = container.querySelector("video, audio");
        if (media) {
          media.pause();
          media.src = "";
        }
        currentVideoElement = null;
        lastReportedProgress = 0;
        container.innerHTML = "";
        modal.classList.add("hidden");
        modal.classList.remove("flex");
        loadMedia();
      }

      // ==========================================
      // FILTER FUNCTIONS
      // ==========================================
      function filterByType(type) {
        currentType = type;

        // Update active state on filter buttons
        document.querySelectorAll(".tab-btn").forEach((btn) => {
          btn.classList.remove(
            "active",
            "bg-primary/20",
            "text-white",
            "border",
            "border-primary/30",
          );
          btn.classList.add("text-gray-400");
        });

        const activeBtn = document.getElementById(`filter-${type}`);
        if (activeBtn) {
          activeBtn.classList.add(
            "active",
            "bg-primary/20",
            "text-white",
            "border",
            "border-primary/30",
          );
          activeBtn.classList.remove("text-gray-400");
        } else {
          document
            .getElementById("filter-all")
            .classList.add(
              "active",
              "bg-primary/20",
              "text-white",
              "border",
              "border-primary/30",
            );
          document
            .getElementById("filter-all")
            .classList.remove("text-gray-400");
        }

        loadMedia();
      }

      function filterBySearch() {
        const searchInput = document.getElementById("librarySearchInput");
        currentSearchQuery = searchInput.value.trim().toLowerCase();

        const clearBtn = document.getElementById("clearSearchBtn");
        if (currentSearchQuery) {
          clearBtn.classList.remove("opacity-0", "pointer-events-none");
          clearBtn.classList.add("opacity-100", "pointer-events-auto");
        } else {
          clearBtn.classList.remove("opacity-100", "pointer-events-auto");
          clearBtn.classList.add("opacity-0", "pointer-events-none");
        }

        loadMedia();
      }

      function clearSearch() {
        const searchInput = document.getElementById("librarySearchInput");
        searchInput.value = "";
        currentSearchQuery = "";
        filterBySearch();
        searchInput.focus();
        showToast("Search cleared", "info");
      }

      function logout() {
        localStorage.removeItem("token");
        localStorage.removeItem("user");
        showToast("Logged out successfully", "success");
        setTimeout(() => {
          window.location.href = "login.html";
        }, 1000);
      }

      // Close modal on backdrop click
      document.addEventListener("DOMContentLoaded", () => {
        loadUserData();
        loadMedia();

        const modal = document.getElementById("player-modal");
        modal.addEventListener("click", function (e) {
          if (e.target === this) closePlayer();
        });

        document.addEventListener("keydown", function (e) {
          if (e.key === "Escape") closePlayer();
        });

        const searchInput = document.getElementById("librarySearchInput");
        if (searchInput) {
          searchInput.addEventListener("input", filterBySearch);
        }

        document.addEventListener("click", (event) => {
          const menu = document.getElementById("mobileMenu");
          const btn = document.getElementById("mobileMenuBtn");
          if (!menu || !btn) return;
          if (
            mobileMenuOpen &&
            !menu.contains(event.target) &&
            !btn.contains(event.target)
          ) {
            toggleMobileMenu(false);
          }
        });
      });
    </script>
  </body>
</html>
