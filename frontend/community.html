<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Community | E-Bundle Ethiopia</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+Ethiopic:wght@400;500;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style/community.css"/>
<script>tailwind.config={theme:{extend:{fontFamily:{sans:["Inter","Noto Sans Ethiopic","sans-serif"]},colors:{primary:"#4F46E5",secondary:"#7C3AED",accent:"#EC4899"}}}};</script>
</head>
<body class="antialiased relative selection:bg-primary selection:text-white">
<div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
  <div class="blob bg-primary w-72 h-72 rounded-full top-0 left-0"></div>
  <div class="blob bg-secondary w-96 h-96 rounded-full bottom-0 right-0"></div>
</div>
<div id="toastContainer" class="fixed top-20 right-4 z-50 space-y-2"></div>

<!-- Navbar -->
<nav class="w-full glass border-b border-white/10 px-4 md:px-6 py-4 flex justify-between items-center sticky top-0 z-50">
  <div class="flex items-center space-x-3">
    <button id="sidebarToggleBtn" class="md:hidden w-10 h-10 rounded-lg border border-white/10 hover:bg-white/10 transition-colors flex items-center justify-center" onclick="toggleSidebar()"><i class="fas fa-hashtag"></i></button>
    <div class="flex items-center space-x-3 cursor-pointer" onclick="window.location.href='dashboard.html'">
      <div class="w-10 h-10 bg-gradient-to-br from-primary to-secondary rounded-xl flex items-center justify-center"><i class="fas fa-graduation-cap text-white text-lg"></i></div>
      <span class="text-xl font-bold hidden sm:block">E-Bundle</span>
    </div>
  </div>
  <div class="hidden md:flex items-center space-x-1">
    <a href="dashboard.html" class="nav-btn px-4 py-2 rounded-lg text-gray-300 hover:text-white hover:bg-white/10 transition-all flex items-center space-x-2"><i class="fas fa-home"></i><span>Dashboard</span></a>
    <a href="library.html" class="nav-btn px-4 py-2 rounded-lg text-gray-300 hover:text-white hover:bg-white/10 transition-all flex items-center space-x-2"><i class="fas fa-book"></i><span>Library</span></a>
    <a href="ai-tutor.html" class="nav-btn px-4 py-2 rounded-lg text-gray-300 hover:text-white hover:bg-white/10 transition-all flex items-center space-x-2"><i class="fas fa-robot"></i><span>AI Tutor</span></a>
    <a href="community.html" class="nav-btn px-4 py-2 rounded-lg text-white bg-white/10 transition-all flex items-center space-x-2"><i class="fas fa-users"></i><span>Community</span></a>
    <a href="kahoot.html" class="nav-btn px-4 py-2 rounded-lg text-gray-300 hover:text-white hover:bg-white/10 transition-all flex items-center space-x-2"><i class="fas fa-gamepad"></i><span>Kahoot</span></a>
    <a href="video-chat.html" class="nav-btn px-4 py-2 rounded-lg text-gray-300 hover:text-white hover:bg-white/10 transition-all flex items-center space-x-2"><i class="fas fa-video"></i><span>Video Chat</span></a>
  </div>
  <div class="flex items-center space-x-2 sm:space-x-4">
    <button id="mobileMenuBtn" class="md:hidden w-10 h-10 rounded-lg border border-white/10 hover:bg-white/10 transition-colors flex items-center justify-center" onclick="toggleMobileMenu()"><i class="fas fa-bars"></i></button>
    <div class="hidden sm:flex items-center space-x-2 bg-white/5 px-3 py-1.5 rounded-full border border-white/10">
      <i class="fas fa-fire text-orange-500"></i>
      <span class="text-sm font-semibold" id="streakText">0 Day Streak</span>
    </div>
    <div class="relative group">
      <div class="w-10 h-10 rounded-full bg-gradient-to-r from-primary to-secondary p-[2px] cursor-pointer">
        <img id="navAvatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=User" class="w-full h-full rounded-full bg-slate-900"/>
      </div>
      <div class="absolute right-0 mt-2 w-48 glass rounded-xl border border-white/10 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all z-50">
        <div class="p-2">
          <div class="px-4 py-2 text-sm text-gray-400 border-b border-white/10 mb-1" id="navUserName">Loading...</div>
          <a href="profile.html" class="w-full text-left px-4 py-2 hover:bg-white/10 rounded-lg text-sm transition-colors block">Profile</a>
          <hr class="border-white/10 my-2"/>
          <a href="#" onclick="logout()" class="w-full text-left px-4 py-2 hover:bg-red-500/20 text-red-400 rounded-lg text-sm transition-colors block">Logout</a>
        </div>
      </div>
    </div>
  </div>
</nav>

<!-- Mobile Menu -->
<div id="mobileMenu" class="md:hidden hidden glass border-b border-white/10 px-4 py-3 space-y-2 relative z-40">
  <a href="dashboard.html" class="block px-3 py-2 rounded-lg hover:bg-white/10">Dashboard</a>
  <a href="library.html" class="block px-3 py-2 rounded-lg hover:bg-white/10">Library</a>
  <a href="ai-tutor.html" class="block px-3 py-2 rounded-lg hover:bg-white/10">AI Tutor</a>
  <a href="community.html" class="block px-3 py-2 rounded-lg bg-white/10">Community</a>
  <a href="kahoot.html" class="block px-3 py-2 rounded-lg hover:bg-white/10">Kahoot</a>
  <a href="video-chat.html" class="block px-3 py-2 rounded-lg hover:bg-white/10">Video Chat</a>
</div>

<!-- Main -->
<main class="h-[calc(100vh-73px)] relative z-10">
  <div class="p-4 h-full max-w-7xl mx-auto">
    <section class="fade-in h-full">
      <div class="h-full flex gap-4 relative">
        <!-- Overlay -->
        <div id="sidebarOverlay" class="fixed inset-0 bg-black/50 z-20 hidden md:hidden" onclick="toggleSidebar()"></div>

        <!-- Sidebar -->
        <div id="channelsSidebar" class="w-72 glass-card rounded-2xl overflow-hidden flex flex-col h-full absolute md:relative z-30 transform -translate-x-[120%] md:translate-x-0 transition-transform duration-300 left-0 top-0 bottom-0 bg-[#0f172a]">
          <div class="p-4 border-b border-white/10">
            <h3 class="font-bold text-sm uppercase tracking-wider text-gray-400">Study Groups</h3>
            <p class="text-xs text-gray-500 mt-1"><span class="online-dot"></span><span id="onlineUsersCount">0 online</span></p>
          </div>
          <div class="p-2 space-y-1 overflow-y-auto flex-1" id="studyGroupsList">
            <div class="text-center py-6 text-gray-500 text-sm">Loading groups...</div>
          </div>
        </div>

        <!-- Chat Area -->
        <div class="flex-1 glass-card rounded-2xl overflow-hidden flex flex-col h-full min-w-0">
          <!-- Header -->
          <div class="p-4 border-b border-white/10 flex items-center justify-between flex-shrink-0">
            <div class="flex items-center space-x-3">
              <div class="w-9 h-9 bg-primary/20 rounded-lg flex items-center justify-center" id="currentGroupIcon">
                <i class="fas fa-hashtag text-primary text-sm"></i>
              </div>
              <div>
                <h3 class="font-bold text-sm" id="currentGroupName">Grade 10 Prep</h3>
                <p class="text-xs text-gray-400"><span id="groupOnlineCount">0</span> online</p>
              </div>
            </div>
            <div id="typingIndicator" class="text-xs text-gray-400 hidden">
              <div class="typing-indicator"><span id="typingName">Someone</span> is typing <span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div>
            </div>
          </div>

          <!-- Messages -->
          <div id="communityMessages" class="flex-1 overflow-y-auto p-4 space-y-3 messages-container">
            <div class="flex flex-col items-center justify-center h-full text-gray-500">
              <i class="fas fa-spinner fa-spin text-2xl mb-2"></i>
              <p class="text-sm">Loading messages...</p>
            </div>
          </div>

          <!-- Input -->
          <div class="p-4 border-t border-white/10 flex-shrink-0">
            <div class="msg-input-wrap">
              <input type="text" id="communityInput" class="msg-input" placeholder="Message the group..." onkeydown="handleKey(event)" oninput="handleTyping()"/>
              <button class="send-btn" onclick="sendMessage()" id="sendBtn"><i class="fas fa-paper-plane"></i></button>
            </div>
          </div>
        </div>
      </div>
    </section>
  </div>
</main>

<script>
const API_URL = "https://e-bundle.onrender.com";
const SOCKET_URL = "https://e-bundle.onrender.com";

let currentUser = null;
let currentGroup = "grade10-prep";
let socket = null;
let typingTimeout = null;
let isTyping = false;
let mobileMenuOpen = false;
let sidebarOpen = false;
const unreadCounts = {};
const groupMessages = {}; // { groupId: [...msgs] }

const GROUPS = [
  {id:"grade9-prep",    name:"Grade 9 Prep",       icon:"fa-hashtag",      color:"indigo", subject:"General"},
  {id:"grade10-prep",   name:"Grade 10 Prep",       icon:"fa-hashtag",      color:"indigo", subject:"General"},
  {id:"grade12-egsece", name:"Grade 12 EGSECE",     icon:"fa-graduation-cap",color:"purple",subject:"Exam Prep"},
  {id:"math-help",      name:"Math Help Center",    icon:"fa-calculator",   color:"green",  subject:"Math"},
  {id:"science-lab",    name:"Science Lab",         icon:"fa-flask",        color:"purple", subject:"Science"},
  {id:"english-club",   name:"English Club",        icon:"fa-language",     color:"yellow", subject:"Language"},
  {id:"history-buffs",  name:"History Buffs",       icon:"fa-landmark",     color:"red",    subject:"Social"},
];

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2); }

function checkAuth(){
  const t=localStorage.getItem("token");
  if(!t){ window.location.href="login.html"; return null; }
  return t;
}

async function fetchUserProfile(){
  const token=checkAuth(); if(!token) return;
  try{
    const r=await fetch(`${API_URL}/profile`,{headers:{Authorization:`Bearer ${token}`}});
    if(!r.ok){ if(r.status===401){ localStorage.removeItem("token"); window.location.href="login.html"; } return; }
    const d=await r.json();
    currentUser=d.user;
    document.getElementById("navUserName").textContent=currentUser.firstName||"User";
    document.getElementById("streakText").textContent=`${currentUser.streak||0} Day Streak`;
    if(currentUser.avatar) document.getElementById("navAvatar").src=currentUser.avatar;
    connectSocket(token);
  }catch(e){ console.error(e); showToast("Failed to load profile","error"); }
}

function connectSocket(token){
  if(socket) socket.disconnect();
  socket=io(SOCKET_URL,{auth:{token},transports:["websocket","polling"],reconnection:true});
  socket.on("connect",()=>{ showToast("Connected","success"); joinGroup(currentGroup); });
  socket.on("connect_error",()=>{ showToast("Connection error — offline mode","error"); });

  socket.on("group_history",({groupId,messages})=>{
    groupMessages[groupId]=messages.map(normaliseMsg);
    if(groupId===currentGroup) renderMessages();
  });

  socket.on("new_message",(msg)=>{
    const m=normaliseMsg(msg);
    if(!groupMessages[m.groupId]) groupMessages[m.groupId]=[];
    // Avoid duplicate (optimistic)
    if(!groupMessages[m.groupId].find(x=>x.messageId===m.messageId)){
      groupMessages[m.groupId].push(m);
    }
    if(m.groupId===currentGroup){ renderMessages(); }
    else{ unreadCounts[m.groupId]=(unreadCounts[m.groupId]||0)+1; renderGroups(); }
  });

  socket.on("message_edited",({messageId,groupId,newText})=>{
    const arr=groupMessages[groupId]||[];
    const m=arr.find(x=>x.messageId===messageId);
    if(m){ m.text=newText; m.edited=true; }
    if(groupId===currentGroup) renderMessages();
  });

  socket.on("message_deleted",({messageId,groupId})=>{
    if(groupMessages[groupId]){
      groupMessages[groupId]=groupMessages[groupId].filter(x=>x.messageId!==messageId);
    }
    if(groupId===currentGroup) renderMessages();
  });

  socket.on("user_typing",({groupId,userId,userName})=>{
    if(groupId===currentGroup && userId!==currentUser?.id){
      const el=document.getElementById("typingIndicator");
      document.getElementById("typingName").textContent=userName||"Someone";
      el.classList.remove("hidden");
      clearTimeout(typingTimeout);
      typingTimeout=setTimeout(()=>el.classList.add("hidden"),3000);
    }
  });

  socket.on("group_online_count",({groupId,count})=>{
    if(groupId===currentGroup){
      document.getElementById("groupOnlineCount").textContent=count;
      document.getElementById("onlineUsersCount").textContent=`${count} online`;
    }
  });

  socket.on("user_joined",({groupId,userName})=>{
    if(groupId===currentGroup) showToast(`${userName} joined`,"info");
  });
}

function normaliseMsg(m){
  return {
    messageId: m.messageId||m.id||uid(),
    groupId:   m.groupId,
    userId:    m.userId,
    userName:  m.userName,
    userAvatar:m.userAvatar||`https://api.dicebear.com/7.x/avataaars/svg?seed=${m.userName}`,
    text:      m.text,
    edited:    m.edited||false,
    time:      m.time || (m.createdAt ? new Date(m.createdAt).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}) : ""),
    createdAt: m.createdAt,
  };
}

function joinGroup(groupId){
  if(socket&&socket.connected&&currentUser){
    socket.emit("join_group",{groupId,userId:currentUser.id,userName:currentUser.firstName,userAvatar:currentUser.avatar||""});
  }
}

function leaveGroup(groupId){
  if(socket&&socket.connected&&currentUser){
    socket.emit("leave_group",{groupId,userId:currentUser.id});
  }
}

function switchGroup(groupId){
  if(currentGroup===groupId) return;
  leaveGroup(currentGroup);
  currentGroup=groupId;
  unreadCounts[groupId]=0;
  const g=GROUPS.find(x=>x.id===groupId);
  if(g){
    document.getElementById("currentGroupName").textContent=g.name;
    document.getElementById("currentGroupIcon").innerHTML=`<i class="fas ${g.icon} text-primary text-sm"></i>`;
  }
  document.getElementById("groupOnlineCount").textContent="0";
  document.getElementById("onlineUsersCount").textContent="0 online";
  renderGroups();
  if(groupMessages[groupId]){ renderMessages(); }
  else{
    document.getElementById("communityMessages").innerHTML=`<div class="flex flex-col items-center justify-center h-full text-gray-500"><i class="fas fa-spinner fa-spin text-2xl mb-2"></i><p class="text-sm">Loading...</p></div>`;
  }
  joinGroup(groupId);
  if(window.innerWidth<768) toggleSidebar(false);
}

function renderGroups(){
  const c=document.getElementById("studyGroupsList");
  c.innerHTML=GROUPS.map(g=>{
    const active=g.id===currentGroup;
    const unread=unreadCounts[g.id]||0;
    return `<button onclick="switchGroup('${g.id}')" class="group-btn w-full p-3 rounded-xl flex items-center space-x-3 text-left ${active?'active':'hover:bg-white/5'}">
      <div class="w-9 h-9 rounded-lg flex items-center justify-center bg-${g.color}-500/15 flex-shrink-0">
        <i class="fas ${g.icon} text-${g.color}-400 text-sm"></i>
      </div>
      <div class="flex-1 min-w-0">
        <p class="font-medium text-sm truncate">${g.name}</p>
        <p class="text-xs text-gray-500">${g.subject}</p>
      </div>
      ${unread?`<div class="unread-badge">${unread>99?"99+":unread}</div>`:""}
    </button>`;
  }).join("");
}

function renderMessages(){
  const msgs=groupMessages[currentGroup]||[];
  const c=document.getElementById("communityMessages");
  if(!msgs.length){
    c.innerHTML=`<div class="flex flex-col items-center justify-center h-full text-gray-500"><i class="fas fa-comments text-4xl mb-3 opacity-40"></i><p class="text-sm">No messages yet — start the conversation!</p></div>`;
    return;
  }
  c.innerHTML=msgs.map(m=>{
    const isSelf=m.userId===currentUser?.id;
    const avatar=m.userAvatar||`https://api.dicebear.com/7.x/avataaars/svg?seed=${m.userName}`;
    const editedTag=m.edited?`<span class="edited-tag">(edited)</span>`:"";
    const actions=isSelf?`
      <div class="msg-actions ${isSelf?"order-first":""}">
        <button class="msg-action-btn edit-btn" onclick="startEdit('${m.messageId}')" title="Edit"><i class="fas fa-pencil"></i></button>
        <button class="msg-action-btn delete-btn" onclick="deleteMsg('${m.messageId}')" title="Delete"><i class="fas fa-trash"></i></button>
      </div>`:"";
    return `<div class="message-row ${isSelf?"self":""}" id="row-${m.messageId}">
      ${!isSelf?`<img src="${escHtml(avatar)}" class="avatar-sm" onerror="this.src='https://api.dicebear.com/7.x/avataaars/svg?seed=User'"/>`:""}
      ${actions}
      <div class="message-bubble ${isSelf?"self":"other"}">
        ${!isSelf?`<p class="text-xs font-semibold text-indigo-400 mb-1">${escHtml(m.userName)}</p>`:""}
        <p class="text-sm text-gray-200" id="txt-${m.messageId}">${escHtml(m.text)}</p>
        <p class="text-xs text-gray-500 mt-1 ${isSelf?"text-left":"text-right"}">${m.time}${editedTag}</p>
      </div>
      ${isSelf?`<img src="${escHtml(avatar)}" class="avatar-sm" onerror="this.src='https://api.dicebear.com/7.x/avataaars/svg?seed=User'"/>`:""}
    </div>`;
  }).join("");
  c.scrollTop=c.scrollHeight;
}

function sendMessage(){
  const inp=document.getElementById("communityInput");
  const text=inp.value.trim();
  if(!text||!currentUser) return;
  const msg=normaliseMsg({
    messageId:uid(), groupId:currentGroup,
    userId:currentUser.id, userName:currentUser.firstName,
    userAvatar:currentUser.avatar||"", text,
    time:new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}),
    createdAt:new Date().toISOString(),
  });
  if(!groupMessages[currentGroup]) groupMessages[currentGroup]=[];
  groupMessages[currentGroup].push(msg);
  renderMessages();
  inp.value="";
  isTyping=false;
  if(socket&&socket.connected){
    socket.emit("send_message",{...msg});
  } else {
    showToast("Offline — message saved locally","info");
  }
  logActivity();
}

function handleKey(e){
  if(e.key==="Enter"&&!e.shiftKey){ e.preventDefault(); sendMessage(); }
}

function handleTyping(){
  if(!isTyping&&socket&&socket.connected&&currentUser){
    isTyping=true;
    socket.emit("typing",{groupId:currentGroup,userId:currentUser.id,userName:currentUser.firstName});
    setTimeout(()=>{ isTyping=false; },3000);
  }
}

function startEdit(messageId){
  const msgs=groupMessages[currentGroup]||[];
  const m=msgs.find(x=>x.messageId===messageId);
  if(!m) return;
  const row=document.getElementById(`row-${messageId}`);
  const txtEl=document.getElementById(`txt-${messageId}`);
  if(!row||!txtEl) return;
  const orig=m.text;
  txtEl.innerHTML=`<div class="edit-input-wrap">
    <input class="edit-input" id="edit-inp-${messageId}" value="${escAttr(orig)}"/>
    <button class="edit-save-btn" onclick="saveEdit('${messageId}')">Save</button>
    <button class="edit-cancel-btn" onclick="cancelEdit('${messageId}','${escAttr(orig)}')">Cancel</button>
  </div>`;
  const inp=document.getElementById(`edit-inp-${messageId}`);
  if(inp){ inp.focus(); inp.setSelectionRange(inp.value.length,inp.value.length); }
}

function saveEdit(messageId){
  const inp=document.getElementById(`edit-inp-${messageId}`);
  if(!inp) return;
  const newText=inp.value.trim();
  if(!newText) return;
  if(socket&&socket.connected&&currentUser){
    socket.emit("edit_message",{messageId,groupId:currentGroup,userId:currentUser.id,newText});
  }
  const msgs=groupMessages[currentGroup]||[];
  const m=msgs.find(x=>x.messageId===messageId);
  if(m){ m.text=newText; m.edited=true; }
  renderMessages();
}

function cancelEdit(messageId,orig){
  const txtEl=document.getElementById(`txt-${messageId}`);
  if(txtEl) txtEl.textContent=orig;
  renderMessages();
}

function deleteMsg(messageId){
  if(!confirm("Delete this message?")) return;
  if(socket&&socket.connected&&currentUser){
    socket.emit("delete_message",{messageId,groupId:currentGroup,userId:currentUser.id});
  }
  if(groupMessages[currentGroup]){
    groupMessages[currentGroup]=groupMessages[currentGroup].filter(x=>x.messageId!==messageId);
  }
  renderMessages();
}

async function logActivity(){
  try{
    const token=localStorage.getItem("token");
    await fetch(`${API_URL}/log-activity`,{method:"POST",headers:{Authorization:`Bearer ${token}`,"Content-Type":"application/json"},body:JSON.stringify({type:"community",title:"Community Message",description:`Sent message in ${currentGroup}`,xp:2})});
  }catch(e){}
}

function escHtml(t){
  const d=document.createElement("div"); d.textContent=String(t||""); return d.innerHTML;
}
function escAttr(t){
  return String(t||"").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}

function showToast(msg,type="info"){
  const c=document.getElementById("toastContainer");
  const t=document.createElement("div");
  const colors=type==="error"?"bg-red-500/20 border-red-500/50 text-red-400":type==="success"?"bg-green-500/20 border-green-500/50 text-green-400":"bg-primary/20 border-primary/50 text-primary";
  const icon=type==="error"?"fa-exclamation-circle":type==="success"?"fa-check-circle":"fa-info-circle";
  t.className=`px-4 py-3 rounded-xl glass border ${colors} text-sm flex items-center space-x-2 transform translate-x-full transition-transform duration-300`;
  t.innerHTML=`<i class="fas ${icon}"></i><span>${msg}</span>`;
  c.appendChild(t);
  setTimeout(()=>t.classList.remove("translate-x-full"),10);
  setTimeout(()=>{ t.classList.add("translate-x-full"); setTimeout(()=>t.remove(),300); },3000);
}

function logout(){
  if(socket) socket.disconnect();
  localStorage.removeItem("token");
  localStorage.removeItem("user");
  showToast("Logged out","success");
  setTimeout(()=>window.location.href="login.html",900);
}

function toggleMobileMenu(){
  mobileMenuOpen=!mobileMenuOpen;
  document.getElementById("mobileMenu").classList.toggle("hidden",!mobileMenuOpen);
}

function toggleSidebar(force){
  const sb=document.getElementById("channelsSidebar");
  const ov=document.getElementById("sidebarOverlay");
  sidebarOpen=typeof force==="boolean"?force:!sidebarOpen;
  if(sidebarOpen){
    sb.classList.remove("-translate-x-[120%]"); sb.classList.add("translate-x-0");
    ov.classList.remove("hidden");
  } else {
    sb.classList.add("-translate-x-[120%]"); sb.classList.remove("translate-x-0");
    ov.classList.add("hidden");
  }
}

document.addEventListener("DOMContentLoaded",()=>{
  fetchUserProfile();
  renderGroups();
  const g=GROUPS.find(x=>x.id===currentGroup);
  if(g){
    document.getElementById("currentGroupName").textContent=g.name;
    document.getElementById("currentGroupIcon").innerHTML=`<i class="fas ${g.icon} text-primary text-sm"></i>`;
  }
});
</script>
</body>
</html>
