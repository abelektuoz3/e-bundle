<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>Change Password | E-Bundle Ethiopia</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome -->
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet" />

    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+Ethiopic:wght@400;500;700&display=swap"
      rel="stylesheet" />

    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "Noto Sans Ethiopic", "sans-serif"],
            },
            colors: {
              primary: "#4F46E5",
              secondary: "#7C3AED",
              accent: "#EC4899",
              success: "#10B981",
              error: "#EF4444",
            },
            animation: {
              blob: "blob 7s infinite",
              shake: "shake 0.5s ease-in-out",
              "slide-up": "slideUp 0.6s ease-out",
            },
            keyframes: {
              blob: {
                "0%": { transform: "translate(0px, 0px) scale(1)" },
                "33%": { transform: "translate(30px, -50px) scale(1.1)" },
                "66%": { transform: "translate(-20px, 20px) scale(0.9)" },
                "100%": { transform: "translate(0px, 0px) scale(1)" },
              },
              shake: {
                "0%, 100%": { transform: "translateX(0)" },
                "10%, 30%, 50%, 70%, 90%": { transform: "translateX(-5px)" },
                "20%, 40%, 60%, 80%": { transform: "translateX(5px)" },
              },
              slideUp: {
                from: { opacity: 0, transform: "translateY(30px)" },
                to: { opacity: 1, transform: "translateY(0)" },
              },
            },
          },
        },
      };
    </script>

    <style>
      /* Custom styles */
      body {
        background-color: #0f172a;
        color: #f8fafc;
        font-family: "Inter", "Noto Sans Ethiopic", sans-serif;
      }

      .glass-card {
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.05) 0%,
          rgba(255, 255, 255, 0.01) 100%
        );
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.05);
        transition: all 0.3s ease;
      }

      .glass-card:hover {
        border-color: rgba(79, 70, 229, 0.3);
        transform: translateY(-2px);
      }

      .blob {
        position: absolute;
        filter: blur(60px);
        opacity: 0.3;
        animation: blob 7s infinite;
      }

      @keyframes blob {
        0% {
          transform: translate(0px, 0px) scale(1);
        }
        33% {
          transform: translate(30px, -50px) scale(1.1);
        }
        66% {
          transform: translate(-20px, 20px) scale(0.9);
        }
        100% {
          transform: translate(0px, 0px) scale(1);
        }
      }

      .animation-delay-2000 {
        animation-delay: 2s;
      }

      .spinner {
        border: 2px solid rgba(255, 255, 255, 0.1);
        border-left-color: #ffffff;
        border-radius: 50%;
        width: 20px;
        height: 20px;
        animation: spin 1s linear infinite;
        display: inline-block;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .input-error {
        border-color: #ef4444 !important;
        animation: shake 0.5s ease-in-out;
      }

      .input-success {
        border-color: #10b981 !important;
      }

      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        10%,
        30%,
        50%,
        70%,
        90% {
          transform: translateX(-5px);
        }
        20%,
        40%,
        60%,
        80% {
          transform: translateX(5px);
        }
      }

      .error-shake {
        animation: shake 0.5s ease-in-out;
      }

      .password-strength {
        height: 4px;
        margin-top: 8px;
        border-radius: 4px;
        transition: all 0.3s ease;
      }

      .strength-weak {
        background: linear-gradient(90deg, #ef4444, #f97316);
        width: 33%;
      }

      .strength-medium {
        background: linear-gradient(90deg, #f59e0b, #eab308);
        width: 66%;
      }

      .strength-strong {
        background: linear-gradient(90deg, #10b981, #34d399);
        width: 100%;
      }

      .status-overlay {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(15, 23, 42, 0.95);
        backdrop-filter: blur(12px);
        border-radius: 1.5rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        opacity: 0;
        visibility: hidden;
        transition: all 0.3s ease;
        z-index: 10;
      }

      .status-overlay.active {
        opacity: 1;
        visibility: visible;
      }

      .status-overlay.success .checkmark {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        display: block;
        stroke-width: 2;
        stroke: #10b981;
        stroke-miterlimit: 10;
        animation:
          fill 0.4s ease-in-out 0.4s forwards,
          scale 0.3s ease-in-out 0.9s both;
      }

      .checkmark__circle {
        stroke-dasharray: 166;
        stroke-dashoffset: 166;
        stroke-width: 2;
        stroke-miterlimit: 10;
        stroke: #10b981;
        fill: none;
        animation: stroke 0.6s cubic-bezier(0.65, 0, 0.45, 1) forwards;
      }

      .checkmark__check {
        transform-origin: 50% 50%;
        stroke-dasharray: 48;
        stroke-dashoffset: 48;
        animation: stroke 0.3s cubic-bezier(0.65, 0, 0.45, 1) 0.8s forwards;
      }

      @keyframes stroke {
        100% {
          stroke-dashoffset: 0;
        }
      }

      @keyframes scale {
        0%,
        100% {
          transform: none;
        }
        50% {
          transform: scale3d(1.1, 1.1, 1);
        }
      }

      @keyframes fill {
        100% {
          box-shadow: inset 0px 0px 0px 30px #10b981;
        }
      }

      .status-overlay.error .error-x {
        width: 80px;
        height: 80px;
        background: rgba(239, 68, 68, 0.2);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 40px;
        color: #ef4444;
        animation: scale 0.3s ease-in-out;
      }

      .countdown-text {
        font-size: 12px;
        color: #9ca3af;
        margin-top: 16px;
      }

      .input-group {
        position: relative;
      }

      .input-group label {
        position: absolute;
        left: 16px;
        top: 50%;
        transform: translateY(-50%);
        transition: all 0.2s ease;
        pointer-events: none;
        color: #9ca3af;
      }

      .input-group input:focus ~ label,
      .input-group input:not(:placeholder-shown) ~ label {
        top: 0;
        transform: translateY(-50%) scale(0.85);
        background: #0f172a;
        padding: 0 8px;
        left: 12px;
        color: #4f46e5;
      }

      .input-group input {
        padding-top: 20px;
        padding-bottom: 8px;
      }
    </style>
  </head>
  <body
    class="antialiased min-h-screen relative selection:bg-primary selection:text-white flex items-center justify-center p-4">
    <!-- Animated Background -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
      <div class="blob bg-primary w-72 h-72 rounded-full top-0 left-0"></div>
      <div
        class="blob bg-secondary w-96 h-96 rounded-full bottom-0 right-0 animation-delay-2000"></div>
      <div
        class="absolute inset-0 bg-[url('data:image/svg+xml,%3Csvg width=\'60\' height=\'60\' viewBox=\'0 0 60 60\' xmlns=\'http://www.w3.org/2000/svg\'%3E%3Cg fill=\'none\' fill-rule=\'evenodd\'%3E%3Cg fill=\'%239C92AC\' fill-opacity=\'0.05\'%3E%3Cpath d=\'M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z\'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E')] opacity-20"></div>
    </div>

    <!-- Toast Notifications -->
    <div id="toastContainer" class="fixed top-4 right-4 z-50 space-y-2"></div>

    <!-- Change Password Card -->
    <div class="relative z-10 w-full max-w-md">
      <!-- Back to Profile -->
      <div class="mb-6 text-center">
        <a
          href="profile.html"
          class="inline-flex items-center space-x-2 text-gray-400 hover:text-white transition-colors">
          <i class="fas fa-arrow-left"></i>
          <span>Back to Profile</span>
        </a>
      </div>

      <div
        id="changePasswordCard"
        class="glass-card w-full rounded-3xl p-8 animate-slide-up relative overflow-hidden">
        <!-- Status Overlay -->
        <div id="statusOverlay" class="status-overlay">
          <div id="statusIcon"></div>
          <h3 id="statusTitle" class="text-xl font-bold mt-4 mb-2"></h3>
          <p id="statusMessage" class="text-gray-400 text-center px-8"></p>
          <p id="countdownText" class="countdown-text hidden"></p>
          <button
            id="statusBtn"
            onclick="resetForm()"
            class="mt-6 px-6 py-2 bg-primary/20 text-primary rounded-full hover:bg-primary/30 transition-all hidden">
            Try Again
          </button>
        </div>

        <div class="text-center mb-8">
          <div
            class="w-20 h-20 mx-auto bg-gradient-to-br from-primary to-secondary rounded-2xl flex items-center justify-center mb-4 shadow-lg shadow-primary/30">
            <i class="fas fa-key text-white text-3xl"></i>
          </div>
          <h2 class="text-2xl font-bold mb-2">Change Password</h2>
          <p class="text-gray-400 text-sm">
            Set a new password for your account
          </p>
        </div>

        <form
          id="changePasswordForm"
          class="space-y-6"
          onsubmit="event.preventDefault()">
          <!-- New Password -->
          <div class="input-group">
            <input
              type="password"
              id="newPassword"
              placeholder=" "
              class="w-full px-4 py-4 bg-white/5 border border-white/10 rounded-xl focus:outline-none focus:border-primary text-white transition-all"
              required />
            <label for="newPassword">
              <i class="fas fa-lock mr-2"></i>New Password
            </label>
            <button
              type="button"
              onclick="togglePassword('newPassword', this)"
              class="absolute right-4 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-white transition-colors">
              <i class="fas fa-eye"></i>
            </button>
          </div>
          <div id="passwordStrength" class="password-strength"></div>
          <p class="text-xs text-gray-500 mt-1">
            Password must be at least 6 characters
          </p>
          <p id="newPasswordError" class="text-xs text-red-400 mt-1 hidden">
            <i class="fas fa-exclamation-circle mr-1"></i>Password must be at
            least 6 characters
          </p>

          <!-- Confirm New Password -->
          <div class="input-group">
            <input
              type="password"
              id="confirmPassword"
              placeholder=" "
              class="w-full px-4 py-4 bg-white/5 border border-white/10 rounded-xl focus:outline-none focus:border-primary text-white transition-all"
              required />
            <label for="confirmPassword">
              <i class="fas fa-check-circle mr-2"></i>Confirm New Password
            </label>
            <button
              type="button"
              onclick="togglePassword('confirmPassword', this)"
              class="absolute right-4 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-white transition-colors">
              <i class="fas fa-eye"></i>
            </button>
          </div>
          <p id="confirmPasswordError" class="text-xs text-red-400 mt-1 hidden">
            <i class="fas fa-exclamation-circle mr-1"></i>Passwords do not match
          </p>

          <!-- Submit Button -->
          <button
            type="button"
            id="changeBtn"
            onclick="handlePasswordChange()"
            class="w-full py-4 bg-gradient-to-r from-primary to-secondary rounded-xl font-semibold hover:shadow-lg hover:shadow-primary/50 transition-all flex items-center justify-center space-x-2 group">
            <span id="changeBtnText">Update Password</span>
            <div id="changeSpinner" class="spinner hidden"></div>
          </button>
        </form>

        <!-- Help Text -->
        <div class="mt-6 text-center space-y-3">
          <p class="text-sm text-gray-500">
            Remember your password?
            <a
              href="login.html"
              class="text-primary hover:text-primary/80 font-semibold transition-colors"
              >Sign in</a
            >
          </p>
          <div
            class="flex items-center justify-center space-x-4 text-xs text-gray-600">
            <span class="flex items-center"
              ><i class="fas fa-shield-alt mr-1"></i>Secure</span
            >
            <span class="flex items-center"
              ><i class="fas fa-lock mr-1"></i>Encrypted</span
            >
          </div>
        </div>
      </div>

      <!-- Footer -->
      <div class="mt-8 text-center">
        <p class="text-xs text-gray-600">
          Need help?
          <a
            href="mailto:support@ebundle.et"
            class="text-gray-400 hover:text-white transition-colors"
            >Contact Support</a
          >
        </p>
      </div>
    </div>

    <script>
      // ✅ UPDATED: API Configuration - Your deployed backend
      const API_URL = "https://e-bundle.onrender.com";

      // Get token from URL query parameter (for reset password flow)
      function getTokenFromUrl() {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get("token");
      }

      // Toast notification system
      function showToast(message, type = "info") {
        const container = document.getElementById("toastContainer");
        const toast = document.createElement("div");
        const colors =
          type === "error" ? "bg-red-500/20 border-red-500/50 text-red-400"
          : type === "success" ?
            "bg-green-500/20 border-green-500/50 text-green-400"
          : "bg-primary/20 border-primary/50 text-primary";

        toast.className = `px-4 py-3 rounded-xl glass border ${colors} text-sm flex items-center space-x-2 transform translate-x-full transition-transform duration-300`;
        toast.innerHTML = `<i class="fas ${
          type === "error" ? "fa-exclamation-circle"
          : type === "success" ? "fa-check-circle"
          : "fa-info-circle"
        }"></i><span>${message}</span>`;

        container.appendChild(toast);

        setTimeout(() => {
          toast.classList.remove("translate-x-full");
        }, 10);

        setTimeout(() => {
          toast.classList.add("translate-x-full");
          setTimeout(() => toast.remove(), 300);
        }, 3000);
      }

      // Toggle password visibility
      function togglePassword(inputId, btn) {
        const input = document.getElementById(inputId);
        const icon = btn.querySelector("i");

        if (input.type === "password") {
          input.type = "text";
          icon.classList.remove("fa-eye");
          icon.classList.add("fa-eye-slash");
        } else {
          input.type = "password";
          icon.classList.remove("fa-eye-slash");
          icon.classList.add("fa-eye");
        }
      }

      // Password strength checker
      document
        .getElementById("newPassword")
        ?.addEventListener("input", function () {
          const password = this.value;
          const strengthBar = document.getElementById("passwordStrength");

          if (password.length === 0) {
            strengthBar.className = "password-strength";
          } else if (password.length < 6) {
            strengthBar.className = "password-strength strength-weak";
          } else if (password.length < 10) {
            strengthBar.className = "password-strength strength-medium";
          } else {
            strengthBar.className = "password-strength strength-strong";
          }
        });

      // Show status overlay with optional auto-redirect
      function showStatus(
        type,
        title,
        message,
        redirectUrl = null,
        redirectDelay = 3000,
      ) {
        const overlay = document.getElementById("statusOverlay");
        const iconContainer = document.getElementById("statusIcon");
        const titleEl = document.getElementById("statusTitle");
        const messageEl = document.getElementById("statusMessage");
        const countdownText = document.getElementById("countdownText");
        const statusBtn = document.getElementById("statusBtn");

        if (type === "success") {
          overlay.className = "status-overlay success";
          iconContainer.innerHTML = `
                    <svg class="checkmark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 52">
                        <circle class="checkmark__circle" cx="26" cy="26" r="25" fill="none"/>
                        <path class="checkmark__check" fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8"/>
                    </svg>
                `;
        } else if (type === "error") {
          overlay.className = "status-overlay error";
          iconContainer.innerHTML = `
                    <div class="error-x">
                        <i class="fas fa-times"></i>
                    </div>
                `;
        }

        titleEl.textContent = title;
        messageEl.textContent = message;

        // Handle redirect countdown for success
        if (type === "success" && redirectUrl) {
          let secondsLeft = Math.ceil(redirectDelay / 1000);
          countdownText.classList.remove("hidden");
          countdownText.textContent = `Redirecting to login in ${secondsLeft} seconds...`;
          statusBtn.classList.add("hidden");

          // Update countdown every second
          const countdownInterval = setInterval(() => {
            secondsLeft--;
            if (secondsLeft > 0) {
              countdownText.textContent = `Redirecting to login in ${secondsLeft} seconds...`;
            }
          }, 1000);

          // Redirect after delay
          setTimeout(() => {
            clearInterval(countdownInterval);
            window.location.href = redirectUrl;
          }, redirectDelay);
        } else {
          countdownText.classList.add("hidden");
          statusBtn.classList.remove("hidden");
        }

        overlay.classList.add("active");
      }

      // Hide status overlay
      function hideStatus() {
        const overlay = document.getElementById("statusOverlay");
        overlay.classList.remove("active");
      }

      // Reset form
      function resetForm() {
        hideStatus();
        document.getElementById("newPassword").value = "";
        document.getElementById("confirmPassword").value = "";
        document.getElementById("passwordStrength").className =
          "password-strength";
        document
          .getElementById("newPassword")
          .classList.remove("input-error", "input-success");
        document
          .getElementById("confirmPassword")
          .classList.remove("input-error", "input-success");
        document.getElementById("newPasswordError").classList.add("hidden");
        document.getElementById("confirmPasswordError").classList.add("hidden");
        document.getElementById("newPassword").focus();
      }

      // Validate form
      function validateForm() {
        const newPassword = document.getElementById("newPassword");
        const confirmPassword = document.getElementById("confirmPassword");
        const newPasswordError = document.getElementById("newPasswordError");
        const confirmPasswordError = document.getElementById(
          "confirmPasswordError",
        );

        let isValid = true;

        // Reset states
        newPassword.classList.remove("input-error", "input-success");
        confirmPassword.classList.remove("input-error", "input-success");
        newPasswordError.classList.add("hidden");
        confirmPasswordError.classList.add("hidden");

        // Validate new password
        if (!newPassword.value || newPassword.value.length < 6) {
          newPassword.classList.add("input-error");
          newPasswordError.classList.remove("hidden");
          isValid = false;
        } else {
          newPassword.classList.add("input-success");
        }

        // Validate confirm password
        if (newPassword.value !== confirmPassword.value) {
          confirmPassword.classList.add("input-error");
          confirmPasswordError.classList.remove("hidden");
          isValid = false;
        } else if (confirmPassword.value) {
          confirmPassword.classList.add("input-success");
        }

        return isValid;
      }

      // Handle password change
      async function handlePasswordChange() {
        if (!validateForm()) {
          const card = document.getElementById("changePasswordCard");
          card.classList.add("error-shake");
          setTimeout(() => card.classList.remove("error-shake"), 500);
          showToast("Please fix the errors above", "error");
          return;
        }

        const newPassword = document.getElementById("newPassword").value;
        const token = getTokenFromUrl();

        // Get button elements
        const btn = document.getElementById("changeBtn");
        const btnText = document.getElementById("changeBtnText");
        const spinner = document.getElementById("changeSpinner");

        // Show loading state
        btn.disabled = true;
        btnText.textContent = "Updating...";
        spinner.classList.remove("hidden");

        try {
          // API call to reset password
          const response = await fetch(`${API_URL}/reset-password`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              token: token,
              newPassword: newPassword,
            }),
          });

          const data = await response.json();

          if (response.ok) {
            // Show success and redirect to login.html after 3 seconds
            showStatus(
              "success",
              "Password Updated!",
              "Your password has been successfully changed. You can now log in with your new password.",
              "login.html",
              3000,
            );
          } else {
            throw new Error(data.message || "Failed to update password");
          }
        } catch (error) {
          console.error("Password change error:", error);
          showStatus(
            "error",
            "Error",
            error.message ||
              "Failed to update password. The link may have expired.",
          );
          // Reset button state
          btn.disabled = false;
          btnText.textContent = "Update Password";
          spinner.classList.add("hidden");
        }
      }

      // Check for token on load
      document.addEventListener("DOMContentLoaded", () => {
        const token = getTokenFromUrl();
        if (!token) {
          showToast("Invalid or missing reset token", "error");
          setTimeout(() => {
            window.location.href = "forget-pass.html";
          }, 2000);
        } else {
          // Focus on password input
          setTimeout(() => {
            document.getElementById("newPassword").focus();
          }, 500);
        }
      });

      // Allow Enter key to submit
      document
        .getElementById("confirmPassword")
        .addEventListener("keypress", function (e) {
          if (e.key === "Enter") {
            handlePasswordChange();
          }
        });

      // Real-time password confirmation check
      document
        .getElementById("confirmPassword")
        .addEventListener("input", function () {
          const newPassword = document.getElementById("newPassword").value;
          const confirmPassword = this.value;
          const errorEl = document.getElementById("confirmPasswordError");

          if (confirmPassword && newPassword !== confirmPassword) {
            errorEl.classList.remove("hidden");
            this.classList.add("input-error");
          } else {
            errorEl.classList.add("hidden");
            this.classList.remove("input-error");
            if (confirmPassword) {
              this.classList.add("input-success");
            } else {
              this.classList.remove("input-success");
            }
          }
        });
    </script>
  </body>
</html>
