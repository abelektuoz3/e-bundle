<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Video Chat | E-Bundle Ethiopia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet" />
    <style>
      body {
        background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
        font-family: "Inter", sans-serif;
      }
      .glass {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .glass-card {
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.05) 0%,
          rgba(255, 255, 255, 0.01) 100%
        );
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }
      #jitsi-container {
        width: 100%;
        height: 100%;
        border-radius: 1rem;
        overflow: hidden;
      }
      iframe {
        width: 100%;
        height: 100%;
        border: none;
      }
    </style>
  </head>
  <body class="antialiased min-h-screen relative">
    <!-- Navigation -->
    <nav
      class="w-full glass border-b border-white/10 px-6 py-4 flex justify-between items-center sticky top-0 z-50">
      <div
        class="flex items-center space-x-3 cursor-pointer"
        onclick="window.location.href = 'dashboard.html'">
        <div
          class="w-10 h-10 bg-gradient-to-br from-primary to-secondary rounded-xl flex items-center justify-center">
          <i class="fas fa-graduation-cap text-white text-lg"></i>
        </div>
        <span class="text-xl font-bold">E-Bundle</span>
      </div>
      <div class="hidden md:flex items-center space-x-1">
        <a
          href="dashboard.html"
          class="px-4 py-2 rounded-lg text-gray-300 hover:text-white hover:bg-white/10 transition-all"
          >Dashboard</a
        >
        <a
          href="library.html"
          class="px-4 py-2 rounded-lg text-gray-300 hover:text-white hover:bg-white/10 transition-all"
          >Library</a
        >
        <a
          href="ai-tutor.html"
          class="px-4 py-2 rounded-lg text-gray-300 hover:text-white hover:bg-white/10 transition-all"
          >AI Tutor</a
        >
        <a
          href="community.html"
          class="px-4 py-2 rounded-lg text-gray-300 hover:text-white hover:bg-white/10 transition-all"
          >Community</a
        >
        <a
          href="kahoot.html"
          class="px-4 py-2 rounded-lg text-gray-300 hover:text-white hover:bg-white/10 transition-all"
          >Kahoot</a
        >
        <a
          href="video-chat.html"
          class="px-4 py-2 rounded-lg text-white bg-white/10 transition-all"
          >Video Chat</a
        >
      </div>
    </nav>

    <!-- Main Content -->
    <main class="p-4 max-w-7xl mx-auto h-[calc(100vh-5rem)]">
      <div
        class="h-full glass-card rounded-2xl overflow-hidden border border-white/10 relative">
        <!-- Jitsi Meet Container -->
        <div id="jitsi-container" class="bg-black"></div>

        <!-- Waiting Screen (shown before room creation) -->
        <div
          id="waitingScreen"
          class="absolute inset-0 flex flex-col items-center justify-center bg-gradient-to-b from-gray-900 to-black z-20">
          <div class="text-center space-y-4">
            <div class="w-24 h-24 relative mx-auto">
              <div
                class="absolute inset-0 border-4 border-primary border-t-transparent rounded-full animate-spin"></div>
              <i
                class="fas fa-video text-4xl text-primary absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2"></i>
            </div>
            <h2 class="text-2xl font-bold">Study Together</h2>
            <p class="text-gray-400 max-w-md">
              Connect with fellow Ethiopian students for collaborative learning
              sessions
            </p>
            <div class="flex gap-2 justify-center mt-4">
              <span class="px-3 py-1 bg-white/10 rounded-full text-sm"
                ><i class="fas fa-video mr-1"></i> Video Chat</span
              >
              <span class="px-3 py-1 bg-white/10 rounded-full text-sm"
                ><i class="fas fa-users mr-1"></i> Study Groups</span
              >
              <span class="px-3 py-1 bg-white/10 rounded-full text-sm"
                ><i class="fas fa-chalkboard-user mr-1"></i> Grade 9-12</span
              >
            </div>
            <button
              onclick="videoChatApp.start()"
              class="mt-6 px-8 py-3 bg-gradient-to-r from-primary to-secondary rounded-xl font-bold hover:scale-105 transition-all shadow-lg">
              <i class="fas fa-video mr-2"></i> Start Video Study Session
            </button>
            <button
              onclick="videoChatApp.joinRandom()"
              class="mt-2 px-6 py-2 glass rounded-xl hover:bg-white/10 transition-all">
              <i class="fas fa-random mr-2"></i> Join Random Session
            </button>
          </div>
        </div>
      </div>
    </main>

    <script>
      // Load Jitsi Meet API
      const loadJitsiScript = (callback) => {
        if (window.JitsiMeetExternalAPI) {
          callback();
          return;
        }
        const script = document.createElement("script");
        script.src = "https://meet.jit.si/external_api.js";
        script.async = true;
        script.onload = callback;
        document.head.appendChild(script);
      };

      const videoChatApp = {
        jitsiApi: null,
        roomName: null,
        isInCall: false,
        userName: null,

        init: async () => {
          const token = localStorage.getItem("token");
          if (!token) {
            videoChatApp.showToast("Please login to use video chat", "error");
            setTimeout(() => (window.location.href = "login.html"), 2000);
            return;
          }

          // Get user data
          try {
            const storedUser = localStorage.getItem("user");
            if (storedUser) {
              const user = JSON.parse(storedUser);
              videoChatApp.userName = `${user.firstName} ${user.lastName ? user.lastName.charAt(0) + "." : ""} (Grade ${user.grade || "?"})`;
            }
          } catch (e) {
            videoChatApp.userName = "Student";
          }
        },

        start: () => {
          // Generate a unique room name based on user ID and timestamp
          const userId = videoChatApp.userName || "student";
          const roomId = `ebundle-${userId.replace(/\s/g, "")}-${Date.now()}`;
          videoChatApp.createRoom(roomId);
        },

        joinRandom: () => {
          // Generate a random room name
          const randomId = Math.random().toString(36).substring(2, 10);
          const roomId = `ebundle-study-${randomId}`;
          videoChatApp.createRoom(roomId);
        },

        createRoom: (roomName) => {
          videoChatApp.roomName = roomName;
          videoChatApp.hideWaitingScreen();
          videoChatApp.showToast("Creating video session...", "info");

          loadJitsiScript(() => {
            const domain = "meet.jit.si";
            const options = {
              roomName: roomName,
              width: "100%",
              height: "100%",
              parentNode: document.getElementById("jitsi-container"),
              userInfo: {
                displayName: videoChatApp.userName || "Study Partner",
              },
              configOverwrite: {
                startWithAudioMuted: false,
                startWithVideoMuted: false,
                prejoinPageEnabled: false,
                disableInviteFunctions: true,
                enableClosePage: true,
                toolbarButtons: [
                  "microphone",
                  "camera",
                  "closedcaptions",
                  "desktop",
                  "fullscreen",
                  "fodeviceselection",
                  "hangup",
                  "profile",
                  "chat",
                  "recording",
                  "livestreaming",
                  "etherpad",
                  "sharedvideo",
                  "shareaudio",
                  "poll",
                  "tileview",
                  "settings",
                  "raisehand",
                  "videoquality",
                  "filmstrip",
                  "feedback",
                  "shortcuts",
                  "help",
                ],
              },
              interfaceConfigOverwrite: {
                SHOW_JITSI_WATERMARK: false,
                SHOW_WATERMARK_FOR_GUESTS: false,
                DEFAULT_BACKGROUND: "#1e1b4b",
                TOOLBAR_BUTTONS: [
                  "microphone",
                  "camera",
                  "desktop",
                  "fullscreen",
                  "fodeviceselection",
                  "hangup",
                  "settings",
                  "chat",
                ],
              },
            };

            videoChatApp.jitsiApi = new JitsiMeetExternalAPI(domain, options);

            videoChatApp.jitsiApi.addListener("videoConferenceJoined", () => {
              videoChatApp.isInCall = true;
              videoChatApp.showToast(
                "Connected! You can now study together.",
                "success",
              );
            });

            videoChatApp.jitsiApi.addListener("participantLeft", (event) => {
              console.log("Participant left:", event);
            });

            videoChatApp.jitsiApi.addListener("readyToClose", () => {
              videoChatApp.endCall();
            });

            videoChatApp.jitsiApi.addListener("videoConferenceLeft", () => {
              videoChatApp.endCall();
            });
          });
        },

        hideWaitingScreen: () => {
          document.getElementById("waitingScreen").classList.add("hidden");
          document.getElementById("jitsi-container").style.display = "block";
        },

        showWaitingScreen: () => {
          document.getElementById("waitingScreen").classList.remove("hidden");
          document.getElementById("jitsi-container").style.display = "none";
        },

        endCall: () => {
          if (videoChatApp.jitsiApi) {
            videoChatApp.jitsiApi.dispose();
            videoChatApp.jitsiApi = null;
          }
          videoChatApp.isInCall = false;
          videoChatApp.roomName = null;
          videoChatApp.showWaitingScreen();
          videoChatApp.showToast("Study session ended", "info");
        },

        showToast: function (message, type = "info") {
          const container = document.getElementById("toastContainer");
          if (!container) {
            // Create toast container if it doesn't exist
            const newContainer = document.createElement("div");
            newContainer.id = "toastContainer";
            newContainer.className = "fixed top-20 right-4 z-50 space-y-2";
            document.body.appendChild(newContainer);
          }
          const toastContainer = document.getElementById("toastContainer");
          const toast = document.createElement("div");
          const colors =
            type === "error" ?
              "bg-red-500/20 border-red-500/50 text-red-400"
            : "bg-green-500/20 border-green-500/50 text-green-400";
          toast.className = `px-4 py-3 rounded-xl glass border ${colors} text-sm flex items-center space-x-3 transform translate-x-full transition-all duration-300`;
          toast.innerHTML = `<i class="fas ${type === "error" ? "fa-exclamation-circle" : "fa-check-circle"}"></i><span>${message}</span>`;
          toastContainer.appendChild(toast);
          setTimeout(() => toast.classList.remove("translate-x-full"), 10);
          setTimeout(() => {
            toast.classList.add("translate-x-full");
            setTimeout(() => toast.remove(), 300);
          }, 3000);
        },
      };

      document.addEventListener("DOMContentLoaded", () => {
        videoChatApp.init();
      });
    </script>
  </body>
</html>
