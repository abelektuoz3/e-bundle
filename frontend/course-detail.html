<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Course Detail | E-Bundle Ethiopia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet" />
    <link rel="stylesheet" href="style/course-detail.css" />
  </head>
  <body class="min-h-screen">
    <div class="max-w-4xl mx-auto p-6">
      <div class="mb-6">
        <a href="library.html" class="text-primary hover:text-primary/80"
          >&larr; Back to Library</a
        >
      </div>
      <div id="courseContent" class="glass rounded-2xl p-6">
        <div class="text-center py-12">
          <i class="fas fa-spinner fa-spin text-3xl"></i>
          <p class="mt-3">Loading course...</p>
        </div>
      </div>
    </div>

    <script>
      const API_URL =
        window.location.hostname === "localhost" ?
          ""
        : "https://e-bundle.onrender.com";
      const authToken = localStorage.getItem("token");
      const urlParams = new URLSearchParams(window.location.search);
      const courseId = urlParams.get("id");

      if (!authToken) {
        window.location.href = "login.html";
      }

      async function loadCourse() {
        if (!courseId) {
          document.getElementById("courseContent").innerHTML =
            '<div class="text-center py-12 text-red-400">No course selected</div>';
          return;
        }

        try {
          const response = await fetch(`${API_URL}/api/courses/${courseId}`, {
            headers: { Authorization: `Bearer ${authToken}` },
          });
          const data = await response.json();

          if (data.success) {
            renderCourse(data.course);
          } else {
            throw new Error(data.message);
          }
        } catch (err) {
          console.error(err);
          document.getElementById("courseContent").innerHTML =
            `<div class="text-center py-12 text-red-400">Failed to load course: ${err.message}</div>`;
        }
      }

      function renderCourse(course) {
        const subjectColors = {
          math: "from-blue-500 to-cyan-500",
          physics: "from-orange-500 to-red-500",
          chemistry: "from-green-500 to-emerald-500",
          biology: "from-purple-500 to-pink-500",
          english: "from-indigo-500 to-blue-500",
          history: "from-yellow-500 to-orange-500",
        };
        const gradient =
          subjectColors[course.subject] || "from-primary to-secondary";

        document.getElementById("courseContent").innerHTML = `
        <div class="bg-gradient-to-r ${gradient} -m-6 p-8 rounded-t-2xl mb-6">
          <h1 class="text-2xl md:text-3xl font-bold mb-2">${escapeHtml(course.title)}</h1>
          <div class="flex flex-wrap gap-3 text-sm">
            <span class="px-2 py-1 rounded-lg bg-black/30">${course.subject.toUpperCase()}</span>
            <span class="px-2 py-1 rounded-lg bg-black/30">Grade ${course.grade}</span>
            <span class="px-2 py-1 rounded-lg bg-black/30"><i class="fas fa-book-open mr-1"></i>${course.totalLessons} lessons</span>
            <span class="px-2 py-1 rounded-lg bg-black/30"><i class="fas fa-chart-line mr-1"></i>${Math.round(course.progress)}% complete</span>
          </div>
        </div>
        
        <div class="mb-8">
          <h2 class="text-xl font-semibold mb-3">About this course</h2>
          <p class="text-gray-300">${escapeHtml(course.description) || "No description available."}</p>
        </div>
        
        <div>
          <h2 class="text-xl font-semibold mb-4">Course Content</h2>
          <div class="space-y-3">
            ${Array(course.totalLessons)
              .fill()
              .map(
                (_, i) => `
              <div class="lesson-item glass rounded-xl p-4 flex justify-between items-center cursor-pointer" onclick="startLesson(${i + 1})">
                <div class="flex items-center space-x-3">
                  <div class="w-8 h-8 rounded-full bg-primary/20 flex items-center justify-center">
                    <i class="fas fa-play text-xs text-primary"></i>
                  </div>
                  <div>
                    <h4 class="font-medium">Lesson ${i + 1}: ${course.title} - Part ${i + 1}</h4>
                    <p class="text-xs text-gray-400">Click to start learning</p>
                  </div>
                </div>
                <i class="fas fa-chevron-right text-gray-500"></i>
              </div>
            `,
              )
              .join("")}
          </div>
        </div>
        
        <div class="mt-8 pt-6 border-t border-white/10">
          <div class="progress-bar h-2 bg-white/10 rounded-full overflow-hidden">
            <div class="progress-fill h-full bg-primary rounded-full" style="width: ${course.progress}%"></div>
          </div>
          <p class="text-sm text-gray-400 mt-2 text-center">${Math.round(course.progress)}% of course completed</p>
        </div>
      `;
      }

      function startLesson(lessonNumber) {
        showToast(`Starting lesson ${lessonNumber}...`, "info");
        // Implement lesson playback logic here
      }

      function escapeHtml(text) {
        if (!text) return "";
        const div = document.createElement("div");
        div.textContent = text;
        return div.innerHTML;
      }

      function showToast(message, type) {
        // Simple alert for now, you can implement proper toast later
        alert(message);
      }

      loadCourse();
    </script>
  </body>
</html>
