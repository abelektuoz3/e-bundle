<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Media Player | E-Bundle Ethiopia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet" />

    <link rel="stylesheet" href="style/course-detail.css" />
  </head>
  <body class="min-h-screen relative">
    <!-- Animated Background -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
      <div class="blob bg-primary w-72 h-72 rounded-full top-0 left-0"></div>
      <div
        class="blob bg-secondary w-96 h-96 rounded-full bottom-0 right-0"></div>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer" class="fixed top-4 right-4 z-50 space-y-2"></div>

    <div class="max-w-4xl mx-auto p-6 relative z-10">
      <div class="mb-6">
        <a
          href="library.html"
          class="text-primary hover:text-primary/80 transition-colors">
          <i class="fas fa-arrow-left mr-2"></i> Back to Library
        </a>
      </div>

      <!-- Media Player Container -->
      <div id="mediaContainer" class="glass rounded-2xl p-6">
        <div class="text-center py-12">
          <i class="fas fa-spinner fa-spin text-3xl"></i>
          <p class="mt-3 text-gray-400">Loading media...</p>
        </div>
      </div>
    </div>

    <script>
      const API_URL =
        window.location.hostname === "localhost" ?
          ""
        : "https://e-bundle.onrender.com";
      const authToken = localStorage.getItem("token");
      const urlParams = new URLSearchParams(window.location.search);
      const mediaId = urlParams.get("id");

      let currentMediaId = null;
      let currentMediaType = null;
      let currentMediaTitle = null;
      let watchStartTime = null;
      let mediaProgress = {};
      let lastReportedProgress = 0;
      let currentVideoElement = null;

      if (!authToken) {
        window.location.href = "login.html";
      }

      function showToast(message, type = "info") {
        const container = document.getElementById("toastContainer");
        const toast = document.createElement("div");
        const colors =
          type === "error" ? "bg-red-500/20 border-red-500/50 text-red-400"
          : type === "success" ?
            "bg-green-500/20 border-green-500/50 text-green-400"
          : "bg-primary/20 border-primary/50 text-primary";

        toast.className = `px-4 py-3 rounded-xl glass border ${colors} text-sm flex items-center space-x-2 toast`;
        toast.innerHTML = `<i class="fas ${
          type === "error" ? "fa-exclamation-circle"
          : type === "success" ? "fa-check-circle"
          : "fa-info-circle"
        }"></i><span>${message}</span>`;

        document.getElementById("toastContainer").appendChild(toast);
        setTimeout(() => {
          toast.style.opacity = "0";
          toast.style.transform = "translateX(100%)";
          setTimeout(() => toast.remove(), 300);
        }, 3000);
      }

      async function loadUserProgress() {
        try {
          const response = await fetch(`${API_URL}/api/media-progress`, {
            headers: { Authorization: `Bearer ${authToken}` },
          });
          const data = await response.json();
          if (data.success) {
            mediaProgress = data.progress || {};
          }
        } catch (err) {
          console.error("Error loading progress:", err);
        }
      }

      async function loadMedia() {
        if (!mediaId) {
          document.getElementById("mediaContainer").innerHTML = `
            <div class="text-center py-12 text-red-400">
              <i class="fas fa-exclamation-circle text-5xl mb-4"></i>
              <p>No media selected</p>
            </div>`;
          return;
        }

        try {
          await loadUserProgress();

          // First, get all media to find the specific one
          const response = await fetch(
            `${API_URL}/api/library/media?type=all`,
            {
              headers: { Authorization: `Bearer ${authToken}` },
            },
          );
          const data = await response.json();

          if (data.success) {
            const media = data.media.find((m) => m.id === mediaId);
            if (media) {
              renderMediaPlayer(media);
            } else {
              throw new Error("Media not found");
            }
          } else {
            throw new Error(data.message || "Failed to load media");
          }
        } catch (err) {
          console.error("Load media error:", err);
          document.getElementById("mediaContainer").innerHTML = `
            <div class="text-center py-12">
              <i class="fas fa-exclamation-circle text-5xl text-red-400 mb-4"></i>
              <p class="text-red-400">Failed to load media: ${err.message}</p>
              <button onclick="loadMedia()" class="mt-4 px-4 py-2 bg-primary rounded-lg hover:bg-primary/80 transition-colors">
                Retry
              </button>
            </div>`;
        }
      }

      async function renderMediaPlayer(media) {
        currentMediaId = media.id;
        currentMediaType = media.type;
        currentMediaTitle = media.title;
        watchStartTime = Date.now();
        lastReportedProgress = 0;

        const currentProgress = mediaProgress[media.id] || 0;
        const streamUrl = `${API_URL}/api/media/stream/${media.id}?token=${encodeURIComponent(authToken)}`;

        const styles = {
          video: {
            gradient: "from-red-500 to-orange-500",
            icon: "fa-play-circle",
            label: "Video",
          },
          audio: {
            gradient: "from-green-500 to-emerald-500",
            icon: "fa-headphones",
            label: "Audio",
          },
          pdf: {
            gradient: "from-orange-500 to-yellow-500",
            icon: "fa-file-pdf",
            label: "PDF",
          },
        };
        const style = styles[media.type] || styles.pdf;

        let playerHtml = "";

        if (media.type === "video") {
          playerHtml = `
            <div class="bg-gradient-to-r ${style.gradient} -m-6 p-8 rounded-t-2xl mb-6">
              <h1 class="text-2xl md:text-3xl font-bold mb-2">${escapeHtml(media.title)}</h1>
              <div class="flex flex-wrap gap-3 text-sm">
                <span class="px-2 py-1 rounded-lg bg-black/30"><i class="fas ${style.icon} mr-1"></i>${style.label}</span>
                <span class="px-2 py-1 rounded-lg bg-black/30"><i class="fas fa-chart-line mr-1"></i>${Math.round(currentProgress)}% complete</span>
              </div>
            </div>
            
            <div class="relative rounded-xl overflow-hidden bg-black">
              <video id="activeVideo" controls class="w-full max-h-[70vh]" autoplay crossorigin="anonymous" playsinline 
                     ontimeupdate="updateVideoProgress(this)" 
                     onended="onMediaEnded()" 
                     onerror="handleMediaError(this)">
                <source src="${streamUrl}">
                Your browser does not support video.
              </video>
            </div>
            
            <div class="mt-4 flex justify-between items-center">
              <button id="markCompleteBtn" onclick="markMediaComplete()" 
                      class="px-4 py-2 bg-success/20 hover:bg-success/30 text-success border border-success/30 rounded-lg text-sm transition-colors flex items-center space-x-2">
                <i class="fas fa-check-circle"></i>
                <span>${currentProgress === 100 ? "Completed" : "Mark as Complete"}</span>
              </button>
              <div class="text-sm text-gray-400">
                Progress: <span id="watchProgress" class="text-primary font-bold">${Math.round(currentProgress)}%</span>
              </div>
            </div>
          `;
        } else if (media.type === "audio") {
          playerHtml = `
            <div class="bg-gradient-to-r ${style.gradient} -m-6 p-8 rounded-t-2xl mb-6">
              <h1 class="text-2xl md:text-3xl font-bold mb-2">${escapeHtml(media.title)}</h1>
              <div class="flex flex-wrap gap-3 text-sm">
                <span class="px-2 py-1 rounded-lg bg-black/30"><i class="fas ${style.icon} mr-1"></i>${style.label}</span>
                <span class="px-2 py-1 rounded-lg bg-black/30"><i class="fas fa-chart-line mr-1"></i>${Math.round(currentProgress)}% complete</span>
              </div>
            </div>
            
            <div class="flex flex-col items-center justify-center p-8 bg-gradient-to-br from-slate-800 to-slate-900 rounded-xl border border-white/10">
              <div class="w-24 h-24 rounded-full bg-gradient-to-br ${style.gradient} flex items-center justify-center mb-6 shadow-lg">
                <i class="fas ${style.icon} text-white text-4xl"></i>
              </div>
              <p class="text-gray-400 mb-6">Audio Lesson</p>
              <audio id="activeAudio" controls class="w-full max-w-md" autoplay crossorigin="anonymous" 
                     ontimeupdate="updateAudioProgress(this)" 
                     onended="onMediaEnded()" 
                     onerror="handleMediaError(this)">
                <source src="${streamUrl}">
                Your browser does not support audio.
              </audio>
            </div>
            
            <div class="mt-4 flex justify-between items-center">
              <button id="markCompleteBtn" onclick="markMediaComplete()" 
                      class="px-4 py-2 bg-success/20 hover:bg-success/30 text-success border border-success/30 rounded-lg text-sm transition-colors flex items-center space-x-2">
                <i class="fas fa-check-circle"></i>
                <span>${currentProgress === 100 ? "Completed" : "Mark as Complete"}</span>
              </button>
              <div class="text-sm text-gray-400">
                Progress: <span id="watchProgress" class="text-primary font-bold">${Math.round(currentProgress)}%</span>
              </div>
            </div>
          `;
        } else if (media.type === "pdf") {
          playerHtml = `
            <div class="bg-gradient-to-r ${style.gradient} -m-6 p-8 rounded-t-2xl mb-6">
              <h1 class="text-2xl md:text-3xl font-bold mb-2">${escapeHtml(media.title)}</h1>
              <div class="flex flex-wrap gap-3 text-sm">
                <span class="px-2 py-1 rounded-lg bg-black/30"><i class="fas ${style.icon} mr-1"></i>${style.label}</span>
                <span class="px-2 py-1 rounded-lg bg-black/30"><i class="fas fa-chart-line mr-1"></i>${Math.round(currentProgress)}% complete</span>
              </div>
            </div>
            
            <div id="pdf-container" class="w-full h-96 bg-slate-800 rounded-xl flex items-center justify-center border border-white/10">
              <div class="text-center">
                <i class="fas fa-spinner fa-spin text-4xl text-primary mb-4"></i>
                <p class="text-gray-400">Loading PDF...</p>
              </div>
            </div>
            
            <div class="mt-4 flex justify-between items-center">
              <div class="flex gap-2">
                <a href="${streamUrl}" target="_blank" class="px-4 py-2 bg-primary hover:bg-primary/80 rounded-lg text-sm transition-colors flex items-center">
                  <i class="fas fa-external-link-alt mr-2"></i>Open in New Tab
                </a>
                <a href="${streamUrl}&download=1" download class="px-4 py-2 bg-white/10 hover:bg-white/20 rounded-lg text-sm transition-colors flex items-center">
                  <i class="fas fa-download mr-2"></i>Download
                </a>
              </div>
              <button id="markCompleteBtn" onclick="markMediaComplete()" 
                      class="px-4 py-2 bg-success/20 hover:bg-success/30 text-success border border-success/30 rounded-lg text-sm transition-colors flex items-center space-x-2">
                <i class="fas fa-check-circle"></i>
                <span>${currentProgress === 100 ? "Completed" : "Mark as Complete"}</span>
              </button>
            </div>
            
            <div class="mt-3 text-center">
              <div class="progress-bar">
                <div class="progress-fill" style="width: ${currentProgress}%"></div>
              </div>
              <p class="text-sm text-gray-400 mt-2">${Math.round(currentProgress)}% complete</p>
            </div>
          `;
        }

        document.getElementById("mediaContainer").innerHTML = playerHtml;

        // Load PDF if needed
        if (media.type === "pdf") {
          const blobUrl = `${streamUrl}&download=1`;
          document.getElementById("pdf-container").innerHTML =
            `<iframe src="${blobUrl}" class="w-full h-full rounded-xl" type="application/pdf"></iframe>`;
          // Auto-mark PDF as 50% when opened
          if (currentProgress < 50) {
            await trackMediaProgress(media.id, 50, false);
          }
        }

        // Set button state
        const btn = document.getElementById("markCompleteBtn");
        if (currentProgress === 100 && btn) {
          btn.innerHTML = '<i class="fas fa-check"></i><span>Completed</span>';
          btn.disabled = true;
        }

        // Log activity
        try {
          await fetch(`${API_URL}/log-activity`, {
            method: "POST",
            headers: {
              Authorization: `Bearer ${authToken}`,
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              type: "lesson",
              title: `Started ${media.type}: ${media.title}`,
              description: `Opened ${media.type} content`,
              xp: 5,
            }),
          });
        } catch (err) {
          console.error("Error logging activity:", err);
        }
      }

      async function trackMediaProgress(
        mediaId,
        progressPercent,
        completed = false,
      ) {
        try {
          const response = await fetch(`${API_URL}/api/track-media`, {
            method: "POST",
            headers: {
              Authorization: `Bearer ${authToken}`,
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              mediaId: mediaId,
              mediaType: currentMediaType,
              progress: progressPercent,
              completed: completed,
              timeSpent: Math.floor((Date.now() - watchStartTime) / 60000),
            }),
          });

          if (response.ok) {
            mediaProgress[mediaId] = completed ? 100 : progressPercent;
            const progressSpan = document.getElementById("watchProgress");
            if (progressSpan)
              progressSpan.textContent = `${Math.round(progressPercent)}%`;

            if (completed) {
              const btn = document.getElementById("markCompleteBtn");
              if (btn) {
                btn.innerHTML =
                  '<i class="fas fa-check"></i><span>Completed</span>';
                btn.disabled = true;
              }
              showToast("Media marked as complete!", "success");
            }
          }
        } catch (err) {
          console.error("Error tracking progress:", err);
        }
      }

      async function markMediaComplete() {
        if (!currentMediaId) return;
        await trackMediaProgress(currentMediaId, 100, true);
      }

      async function updateVideoProgress(videoElement) {
        if (!videoElement || !currentMediaId) return;
        const current = videoElement.currentTime,
          duration = videoElement.duration || 0;
        if (duration === 0) return;
        const percent = (current / duration) * 100;
        const progressSpan = document.getElementById("watchProgress");
        if (progressSpan) progressSpan.textContent = `${Math.round(percent)}%`;
        const threshold = Math.floor(percent / 10) * 10;
        if (threshold > lastReportedProgress || percent >= 95) {
          lastReportedProgress = threshold;
          await trackMediaProgress(currentMediaId, percent, percent >= 95);
        }
      }

      async function updateAudioProgress(audioElement) {
        if (!audioElement || !currentMediaId) return;
        const current = audioElement.currentTime,
          duration = audioElement.duration || 0;
        if (duration === 0) return;
        const percent = (current / duration) * 100;
        const progressSpan = document.getElementById("watchProgress");
        if (progressSpan) progressSpan.textContent = `${Math.round(percent)}%`;
        const threshold = Math.floor(percent / 10) * 10;
        if (threshold > lastReportedProgress || percent >= 95) {
          lastReportedProgress = threshold;
          await trackMediaProgress(currentMediaId, percent, percent >= 95);
        }
      }

      async function onMediaEnded() {
        showToast("Content finished! Marking as complete...", "success");
        await trackMediaProgress(currentMediaId, 100, true);
      }

      function handleMediaError(mediaElement) {
        const errorMessages = {
          1: "Playback was aborted",
          2: "Network error - please check your connection",
          3: "Decode error - file may be corrupted",
          4: "Format not supported by your browser",
        };
        const code = mediaElement.error ? mediaElement.error.code : "unknown";
        const message = errorMessages[code] || "Unknown playback error";
        showToast(message, "error");
      }

      function escapeHtml(text) {
        if (!text) return "";
        const div = document.createElement("div");
        div.textContent = text;
        return div.innerHTML;
      }

      // Initialize
      document.addEventListener("DOMContentLoaded", () => {
        loadMedia();
      });
    </script>
  </body>
</html>
