<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>Forgot Password | E-Bundle Ethiopia</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome -->
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet" />

    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+Ethiopic:wght@400;500;700&display=swap"
      rel="stylesheet" />

    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "Noto Sans Ethiopic", "sans-serif"],
            },
            colors: {
              primary: "#4F46E5",
              secondary: "#7C3AED",
              accent: "#EC4899",
              success: "#10B981",
              error: "#EF4444",
            },
            animation: {
              blob: "blob 7s infinite",
              shake: "shake 0.5s ease-in-out",
              "slide-up": "slideUp 0.6s ease-out",
              "fade-in": "fadeIn 0.5s ease-out",
            },
            keyframes: {
              blob: {
                "0%": { transform: "translate(0px, 0px) scale(1)" },
                "33%": { transform: "translate(30px, -50px) scale(1.1)" },
                "66%": { transform: "translate(-20px, 20px) scale(0.9)" },
                "100%": { transform: "translate(0px, 0px) scale(1)" },
              },
              shake: {
                "0%, 100%": { transform: "translateX(0)" },
                "10%, 30%, 50%, 70%, 90%": { transform: "translateX(-5px)" },
                "20%, 40%, 60%, 80%": { transform: "translateX(5px)" },
              },
              slideUp: {
                from: { opacity: 0, transform: "translateY(30px)" },
                to: { opacity: 1, transform: "translateY(0)" },
              },
              fadeIn: {
                from: { opacity: 0 },
                to: { opacity: 1 },
              },
            },
          },
        },
      };
    </script>

    <link rel="stylesheet" href="style/forget-pass.css" />
  </head>
  <body
    class="antialiased min-h-screen relative selection:bg-primary selection:text-white flex items-center justify-center p-4">
    <!-- Animated Background -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
      <div class="blob bg-primary w-72 h-72 rounded-full top-0 left-0"></div>
      <div
        class="blob bg-secondary w-96 h-96 rounded-full bottom-0 right-0 animation-delay-2000"></div>
      <div
        class="absolute inset-0 bg-[url('data:image/svg+xml,%3Csvg width=\'60\' height=\'60\' viewBox=\'0 0 60 60\' xmlns=\'http://www.w3.org/2000/svg\'%3E%3Cg fill=\'none\' fill-rule=\'evenodd\'%3E%3Cg fill=\'%239C92AC\' fill-opacity=\'0.05\'%3E%3Cpath d=\'M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z\'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E')] opacity-20"></div>
    </div>

    <!-- Toast Notifications -->
    <div id="toastContainer" class="fixed top-4 right-4 z-50 space-y-2"></div>

    <!-- Forgot Password Card -->
    <div class="relative z-10 w-full max-w-md">
      <!-- Back to Login -->
      <div class="mb-6 text-center">
        <a
          href="login.html"
          class="inline-flex items-center space-x-2 text-gray-400 hover:text-white transition-colors">
          <i class="fas fa-arrow-left"></i>
          <span>Back to Login</span>
        </a>
      </div>

      <div
        id="forgotCard"
        class="glass-card w-full rounded-3xl p-8 animate-slide-up relative overflow-hidden">
        <!-- Status Overlay -->
        <div id="statusOverlay" class="status-overlay">
          <div id="statusIcon"></div>
          <h3 id="statusTitle"></h3>
          <p id="statusMessage"></p>
          <button
            id="statusBtn"
            onclick="resetForm()"
            class="mt-6 px-6 py-2 bg-primary/20 text-primary rounded-full hover:bg-primary/30 transition-all hidden">
            Send Another Email
          </button>
        </div>

        <div class="text-center mb-8">
          <div
            class="w-20 h-20 mx-auto bg-gradient-to-br from-primary to-secondary rounded-2xl flex items-center justify-center mb-4 shadow-lg shadow-primary/30">
            <i class="fas fa-lock-open text-white text-3xl"></i>
          </div>
          <h2 class="text-2xl font-bold mb-2">Forgot Password?</h2>
          <p class="text-gray-400 text-sm">
            No worries! Enter your email and we'll send you a reset link.
          </p>
        </div>

        <form
          id="forgotForm"
          class="space-y-6"
          onsubmit="event.preventDefault()">
          <!-- Email Input -->
          <div class="input-group">
            <input
              type="email"
              id="resetEmail"
              placeholder=" "
              class="w-full px-4 py-4 bg-white/5 border border-white/10 rounded-xl focus:outline-none focus:border-primary text-white placeholder-transparent transition-all" />
            <label for="resetEmail" class="text-gray-400">
              <i class="fas fa-envelope mr-2"></i>Email Address
            </label>
            <p
              id="emailError"
              class="text-xs text-red-400 mt-2 hidden flex items-center">
              <i class="fas fa-exclamation-circle mr-1"></i>Please enter a valid
              email address
            </p>
          </div>

          <!-- Submit Button -->
          <button
            type="button"
            id="resetBtn"
            onclick="handlePasswordReset()"
            class="w-full py-4 bg-gradient-to-r from-primary to-secondary rounded-xl font-semibold hover:shadow-lg hover:shadow-primary/50 transition-all flex items-center justify-center space-x-2 group">
            <span id="resetBtnText">Send Reset Link</span>
            <i
              id="resetBtnIcon"
              class="fas fa-paper-plane group-hover:translate-x-1 transition-transform"></i>
            <div id="resetSpinner" class="spinner hidden"></div>
          </button>
        </form>

        <!-- Help Text -->
        <div class="mt-6 text-center space-y-3">
          <p class="text-sm text-gray-500">
            Remember your password?
            <a
              href="login.html"
              class="text-primary hover:text-primary/80 font-semibold transition-colors"
              >Sign in</a
            >
          </p>
          <div
            class="flex items-center justify-center space-x-4 text-xs text-gray-600">
            <span class="flex items-center"
              ><i class="fas fa-shield-alt mr-1"></i>Secure</span
            >
            <span class="flex items-center"
              ><i class="fas fa-bolt mr-1"></i>Instant</span
            >
            <span class="flex items-center"
              ><i class="fas fa-check-circle mr-1"></i>Free</span
            >
          </div>
        </div>
      </div>

      <!-- Footer -->
      <div class="mt-8 text-center">
        <p class="text-xs text-gray-600">
          Need help?
          <a
            href="mailto:support@ebundle.et"
            class="text-gray-400 hover:text-white transition-colors"
            >Contact Support</a
          >
        </p>
      </div>
    </div>

    <script>
      // ✅ UPDATED: API Configuration - Your deployed backend
      const API_URL = "https://e-bundle.onrender.com";

      // Toast notification system
      function showToast(message, type = "info") {
        const container = document.getElementById("toastContainer");
        const toast = document.createElement("div");
        const colors =
          type === "error" ? "bg-red-500/20 border-red-500/50 text-red-400"
          : type === "success" ?
            "bg-green-500/20 border-green-500/50 text-green-400"
          : "bg-primary/20 border-primary/50 text-primary";

        toast.className = `px-4 py-3 rounded-xl glass border ${colors} text-sm flex items-center space-x-2 transform translate-x-full transition-transform duration-300`;
        toast.innerHTML = `<i class="fas ${
          type === "error" ? "fa-exclamation-circle"
          : type === "success" ? "fa-check-circle"
          : "fa-info-circle"
        }"></i><span>${message}</span>`;

        container.appendChild(toast);

        setTimeout(() => {
          toast.classList.remove("translate-x-full");
        }, 10);

        setTimeout(() => {
          toast.classList.add("translate-x-full");
          setTimeout(() => toast.remove(), 300);
        }, 3000);
      }

      // Show status overlay
      function showStatus(type, title, message, showButton = false) {
        const overlay = document.getElementById("statusOverlay");
        const iconContainer = document.getElementById("statusIcon");
        const titleEl = document.getElementById("statusTitle");
        const messageEl = document.getElementById("statusMessage");
        const statusBtn = document.getElementById("statusBtn");

        if (type === "success") {
          overlay.className = "status-overlay sent";
          iconContainer.innerHTML = `
                    <div class="email-icon">
                        <i class="fas fa-envelope-open-text"></i>
                    </div>
                `;
        } else if (type === "error") {
          overlay.className = "status-overlay error";
          iconContainer.innerHTML = `
                    <div class="w-20 h-20 bg-red-500/20 rounded-full flex items-center justify-center">
                        <i class="fas fa-times text-red-400 text-3xl"></i>
                    </div>
                `;
        }

        titleEl.textContent = title;
        messageEl.textContent = message;

        if (showButton) {
          statusBtn.classList.remove("hidden");
        } else {
          statusBtn.classList.add("hidden");
        }

        overlay.classList.add("active");
      }

      // Hide status overlay
      function hideStatus() {
        const overlay = document.getElementById("statusOverlay");
        overlay.classList.remove("active");
      }

      // Reset form
      function resetForm() {
        hideStatus();
        document.getElementById("resetEmail").value = "";
        document
          .getElementById("resetEmail")
          .classList.remove("input-success", "input-error");
      }

      // Validate email
      function validateEmail(email) {
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        return emailRegex.test(email);
      }

      // Handle password reset
      async function handlePasswordReset() {
        const emailInput = document.getElementById("resetEmail");
        const email = emailInput.value.trim();
        const errorEl = document.getElementById("emailError");

        // Reset states
        emailInput.classList.remove("input-error", "input-success");
        errorEl.classList.add("hidden");

        // Validate
        if (!email || !validateEmail(email)) {
          emailInput.classList.add("input-error");
          errorEl.classList.remove("hidden");

          // Shake animation
          const card = document.getElementById("forgotCard");
          card.classList.add("error-shake");
          setTimeout(() => card.classList.remove("error-shake"), 500);

          showToast("Please enter a valid email address", "error");
          return;
        }

        emailInput.classList.add("input-success");

        // Get button elements
        const btn = document.getElementById("resetBtn");
        const btnText = document.getElementById("resetBtnText");
        const btnIcon = document.getElementById("resetBtnIcon");
        const spinner = document.getElementById("resetSpinner");

        // Show loading state
        btn.disabled = true;
        btnText.textContent = "Sending...";
        btnIcon.classList.add("hidden");
        spinner.classList.remove("hidden");

        try {
          // API call to request password reset
          const response = await fetch(`${API_URL}/forgot-password`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ email }),
          });

          const data = await response.json();

          if (response.ok) {
            showStatus(
              "success",
              "Email Sent!",
              `We've sent a password reset link to ${email}. Please check your inbox and spam folder.`,
              true,
            );
            showToast("Password reset email sent successfully!", "success");
          } else {
            // For security, still show success even if email not found
            showStatus(
              "success",
              "Email Sent!",
              `If an account exists for ${email}, you will receive a password reset link shortly.`,
              true,
            );
            showToast(
              "If an account exists, a reset link has been sent",
              "info",
            );
          }
        } catch (error) {
          console.error("Password reset error:", error);
          // Show success anyway for security (don't reveal if email exists)
          showStatus(
            "success",
            "Email Sent!",
            `If an account exists for ${email}, you will receive a password reset link shortly.`,
            true,
          );
          showToast("If an account exists, a reset link has been sent", "info");
        }

        // Reset button state
        btn.disabled = false;
        btnText.textContent = "Send Reset Link";
        btnIcon.classList.remove("hidden");
        spinner.classList.add("hidden");
      }

      // Real-time validation
      document
        .getElementById("resetEmail")
        .addEventListener("input", function () {
          const email = this.value.trim();
          const errorEl = document.getElementById("emailError");

          if (email && validateEmail(email)) {
            this.classList.remove("input-error");
            this.classList.add("input-success");
            errorEl.classList.add("hidden");
          } else if (email) {
            this.classList.remove("input-success");
          }
        });

      // Allow Enter key to submit
      document
        .getElementById("resetEmail")
        .addEventListener("keypress", function (e) {
          if (e.key === "Enter") {
            handlePasswordReset();
          }
        });

      // Focus email input on load
      document.addEventListener("DOMContentLoaded", () => {
        setTimeout(() => {
          document.getElementById("resetEmail").focus();
        }, 500);
      });
    </script>
  </body>
</html>
