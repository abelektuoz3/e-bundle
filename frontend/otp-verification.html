<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>Verify OTP | E-Bundle Ethiopia</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome -->
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet" />

    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+Ethiopic:wght@400;500;700&display=swap"
      rel="stylesheet" />

    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "Noto Sans Ethiopic", "sans-serif"],
            },
            colors: {
              primary: "#4F46E5",
              secondary: "#7C3AED",
              accent: "#EC4899",
              success: "#10B981",
              error: "#EF4444",
            },
            animation: {
              blob: "blob 7s infinite",
              shake: "shake 0.5s ease-in-out",
              "pulse-slow": "pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite",
              "bounce-slow": "bounce 1s infinite",
            },
            keyframes: {
              blob: {
                "0%": { transform: "translate(0px, 0px) scale(1)" },
                "33%": { transform: "translate(30px, -50px) scale(1.1)" },
                "66%": { transform: "translate(-20px, 20px) scale(0.9)" },
                "100%": { transform: "translate(0px, 0px) scale(1)" },
              },
              shake: {
                "0%, 100%": { transform: "translateX(0)" },
                "10%, 30%, 50%, 70%, 90%": { transform: "translateX(-5px)" },
                "20%, 40%, 60%, 80%": { transform: "translateX(5px)" },
              },
            },
          },
        },
      };
    </script>

    <style>
      body {
        background: #0f172a;
        font-family: "Inter", "Noto Sans Ethiopic", sans-serif;
      }

      .glass-card {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        transition: all 0.3s ease;
      }

      .otp-input {
        width: 60px;
        height: 70px;
        text-align: center;
        font-size: 24px;
        font-weight: bold;
        background: rgba(255, 255, 255, 0.05);
        border: 2px solid rgba(255, 255, 255, 0.1);
        border-radius: 16px;
        color: white;
        transition: all 0.3s ease;
      }

      .otp-input:focus {
        outline: none;
        border-color: #4f46e5;
        background: rgba(79, 70, 229, 0.1);
        transform: scale(1.05);
      }

      .otp-input.filled {
        border-color: #4f46e5;
        background: rgba(79, 70, 229, 0.1);
      }

      .otp-input.error {
        border-color: #ef4444;
        animation: shake 0.5s ease-in-out;
      }

      .blob {
        position: absolute;
        filter: blur(60px);
        opacity: 0.3;
        animation: blob 7s infinite;
      }

      @keyframes blob {
        0%,
        100% {
          transform: translate(0px, 0px) scale(1);
        }
        33% {
          transform: translate(30px, -50px) scale(1.1);
        }
        66% {
          transform: translate(-20px, 20px) scale(0.9);
        }
      }

      .animation-delay-2000 {
        animation-delay: 2s;
      }

      .spinner {
        border: 2px solid rgba(255, 255, 255, 0.1);
        border-left-color: #ffffff;
        border-radius: 50%;
        width: 20px;
        height: 20px;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .status-overlay {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(15, 23, 42, 0.95);
        backdrop-filter: blur(12px);
        border-radius: 24px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 10;
        opacity: 0;
        visibility: hidden;
        transition: all 0.3s ease;
      }

      .status-overlay.active {
        opacity: 1;
        visibility: visible;
      }

      .status-overlay.success .checkmark {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        display: block;
        stroke-width: 2;
        stroke: #10b981;
        stroke-miterlimit: 10;
        animation:
          fill 0.4s ease-in-out 0.4s forwards,
          scale 0.3s ease-in-out 0.9s both;
      }

      .status-overlay.success .checkmark__circle {
        stroke-dasharray: 166;
        stroke-dashoffset: 166;
        stroke-width: 2;
        stroke-miterlimit: 10;
        stroke: #10b981;
        fill: none;
        animation: stroke 0.6s cubic-bezier(0.65, 0, 0.45, 1) forwards;
      }

      .status-overlay.success .checkmark__check {
        transform-origin: 50% 50%;
        stroke-dasharray: 48;
        stroke-dashoffset: 48;
        animation: stroke 0.3s cubic-bezier(0.65, 0, 0.45, 1) 0.8s forwards;
      }

      @keyframes stroke {
        100% {
          stroke-dashoffset: 0;
        }
      }

      @keyframes scale {
        0%,
        100% {
          transform: none;
        }
        50% {
          transform: scale3d(1.1, 1.1, 1);
        }
      }

      @keyframes fill {
        100% {
          box-shadow: inset 0px 0px 0px 30px #10b981;
        }
      }

      .status-overlay.error .error-x {
        width: 80px;
        height: 80px;
        background: rgba(239, 68, 68, 0.2);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        animation: scale 0.3s ease-in-out;
      }

      .status-overlay.error .error-x i {
        font-size: 40px;
        color: #ef4444;
      }

      .error-shake {
        animation: shake 0.5s ease-in-out;
      }

      .resend-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .timer-text {
        font-size: 12px;
      }
    </style>
  </head>
  <body
    class="antialiased min-h-screen relative selection:bg-primary selection:text-white flex items-center justify-center p-4">
    <!-- Animated Background -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
      <div class="blob bg-primary w-72 h-72 rounded-full top-0 left-0"></div>
      <div
        class="blob bg-secondary w-96 h-96 rounded-full bottom-0 right-0 animation-delay-2000"></div>
      <div
        class="absolute inset-0 bg-[url('data:image/svg+xml,%3Csvg width=\'60\' height=\'60\' viewBox=\'0 0 60 60\' xmlns=\'http://www.w3.org/2000/svg\'%3E%3Cg fill=\'none\' fill-rule=\'evenodd\'%3E%3Cg fill=\'%239C92AC\' fill-opacity=\'0.05\'%3E%3Cpath d=\'M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z\'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E')] opacity-20"></div>
    </div>

    <!-- Toast Notifications -->
    <div id="toastContainer" class="fixed top-4 right-4 z-50 space-y-2"></div>

    <!-- OTP Verification Card -->
    <div class="relative z-10 w-full max-w-md">
      <!-- Back to Signup -->
      <div class="mb-6 text-center">
        <a
          href="signup.html"
          class="inline-flex items-center space-x-2 text-gray-400 hover:text-white transition-colors">
          <i class="fas fa-arrow-left"></i>
          <span>Back to Sign Up</span>
        </a>
      </div>

      <div
        id="otpCard"
        class="glass-card w-full rounded-3xl p-8 slide-up relative">
        <!-- Status Overlay -->
        <div id="statusOverlay" class="status-overlay">
          <div id="statusIcon"></div>
          <h3 id="statusTitle" class="text-2xl font-bold mt-4 mb-2"></h3>
          <p id="statusMessage" class="text-gray-400 text-center px-4"></p>
        </div>

        <div class="text-center mb-8">
          <div
            class="w-16 h-16 mx-auto bg-gradient-to-br from-primary to-secondary rounded-2xl flex items-center justify-center mb-4">
            <i class="fas fa-shield-alt text-white text-2xl"></i>
          </div>
          <h2 class="text-2xl font-bold">Verify Your Email</h2>
          <p class="text-gray-400 text-sm mt-2">
            We've sent a 6-digit verification code to<br />
            <span id="userEmail" class="text-primary font-semibold"
              >your@email.com</span
            >
          </p>
        </div>

        <!-- OTP Input Section -->
        <div class="space-y-6">
          <!-- OTP Inputs -->
          <div class="flex justify-center space-x-3">
            <input
              type="text"
              maxlength="1"
              class="otp-input"
              id="otp1"
              inputmode="numeric"
              autocomplete="one-time-code" />
            <input
              type="text"
              maxlength="1"
              class="otp-input"
              id="otp2"
              inputmode="numeric" />
            <input
              type="text"
              maxlength="1"
              class="otp-input"
              id="otp3"
              inputmode="numeric" />
            <input
              type="text"
              maxlength="1"
              class="otp-input"
              id="otp4"
              inputmode="numeric" />
            <input
              type="text"
              maxlength="1"
              class="otp-input"
              id="otp5"
              inputmode="numeric" />
            <input
              type="text"
              maxlength="1"
              class="otp-input"
              id="otp6"
              inputmode="numeric" />
          </div>

          <p
            id="otpError"
            class="text-xs text-error text-center hidden text-red-400">
            Please enter all 6 digits
          </p>

          <!-- Verify Button -->
          <button
            type="button"
            id="verifyBtn"
            onclick="handleVerifyOTP()"
            class="w-full py-3 bg-primary rounded-xl font-semibold hover:shadow-lg hover:shadow-primary/50 transition-all flex items-center justify-center space-x-2">
            <span id="verifyBtnText">Verify Code</span>
            <div id="verifySpinner" class="spinner hidden"></div>
          </button>

          <!-- Resend Section -->
          <div class="text-center space-y-3">
            <p class="text-sm text-gray-400">Didn't receive the code?</p>
            <button
              type="button"
              id="resendBtn"
              onclick="handleResendOTP()"
              class="resend-btn text-primary font-semibold text-sm disabled:text-gray-500"
              disabled>
              Resend Code <span id="timer" class="timer-text">(60s)</span>
            </button>
          </div>
        </div>

        <!-- Help Text -->
        <div class="mt-8 pt-6 border-t border-white/10 text-center">
          <p class="text-xs text-gray-500">
            <i class="fas fa-info-circle mr-1"></i>
            Check your spam folder if you don't see the email
          </p>
        </div>
      </div>
    </div>

    <script>
      // ✅ UPDATED: API Configuration - Your deployed backend
      const API_URL = "https://e-bundle.onrender.com";

      let countdown = 60;
      let timerInterval;
      let userEmail = "";

      // Get email from URL parameter or session storage
      document.addEventListener("DOMContentLoaded", () => {
        const urlParams = new URLSearchParams(window.location.search);
        userEmail =
          urlParams.get("email") ||
          sessionStorage.getItem("pendingEmail") ||
          "your@email.com";
        document.getElementById("userEmail").textContent = userEmail;

        // Store email in session storage
        if (userEmail !== "your@email.com") {
          sessionStorage.setItem("pendingEmail", userEmail);
        }

        // Start countdown timer
        startTimer();

        // Setup OTP inputs
        setupOTPInputs();
      });

      // Toast notification system
      function showToast(message, type = "info") {
        const container = document.getElementById("toastContainer");
        const toast = document.createElement("div");
        const colors =
          type === "error" ? "bg-red-500/20 border-red-500/50 text-red-400"
          : type === "success" ?
            "bg-green-500/20 border-green-500/50 text-green-400"
          : "bg-primary/20 border-primary/50 text-primary";

        toast.className = `px-4 py-3 rounded-xl glass border ${colors} text-sm flex items-center space-x-2 transform translate-x-full transition-transform duration-300`;
        toast.innerHTML = `<i class="fas ${
          type === "error" ? "fa-exclamation-circle"
          : type === "success" ? "fa-check-circle"
          : "fa-info-circle"
        }"></i><span>${message}</span>`;

        container.appendChild(toast);

        setTimeout(() => {
          toast.classList.remove("translate-x-full");
        }, 10);

        setTimeout(() => {
          toast.classList.add("translate-x-full");
          setTimeout(() => toast.remove(), 300);
        }, 3000);
      }

      // Setup OTP input handling
      function setupOTPInputs() {
        const inputs = document.querySelectorAll(".otp-input");

        inputs.forEach((input, index) => {
          // Handle input
          input.addEventListener("input", (e) => {
            // Remove non-numeric characters
            e.target.value = e.target.value.replace(/[^0-9]/g, "");

            if (e.target.value) {
              e.target.classList.add("filled");
              // Move to next input
              if (index < inputs.length - 1) {
                inputs[index + 1].focus();
              }
            } else {
              e.target.classList.remove("filled");
            }

            // Clear error state
            e.target.classList.remove("error");
            document.getElementById("otpError").classList.add("hidden");
          });

          // Handle backspace
          input.addEventListener("keydown", (e) => {
            if (e.key === "Backspace" && !e.target.value && index > 0) {
              inputs[index - 1].focus();
              inputs[index - 1].classList.remove("filled");
            }
          });

          // Handle paste
          input.addEventListener("paste", (e) => {
            e.preventDefault();
            const pastedData = e.clipboardData
              .getData("text")
              .replace(/[^0-9]/g, "")
              .slice(0, 6);

            if (pastedData) {
              pastedData.split("").forEach((char, i) => {
                if (inputs[i]) {
                  inputs[i].value = char;
                  inputs[i].classList.add("filled");
                }
              });

              // Focus the next empty input or the last one
              const nextEmpty = Array.from(inputs).find((inp) => !inp.value);
              if (nextEmpty) {
                nextEmpty.focus();
              } else {
                inputs[inputs.length - 1].focus();
              }
            }
          });

          // Handle focus
          input.addEventListener("focus", () => {
            input.select();
          });
        });
      }

      // Get OTP value
      function getOTPValue() {
        const inputs = document.querySelectorAll(".otp-input");
        return Array.from(inputs)
          .map((input) => input.value)
          .join("");
      }

      // Clear OTP inputs
      function clearOTPInputs() {
        const inputs = document.querySelectorAll(".otp-input");
        inputs.forEach((input) => {
          input.value = "";
          input.classList.remove("filled", "error");
        });
        inputs[0].focus();
      }

      // Start countdown timer
      function startTimer() {
        const timerEl = document.getElementById("timer");
        const resendBtn = document.getElementById("resendBtn");

        resendBtn.disabled = true;
        countdown = 60;

        clearInterval(timerInterval);

        timerInterval = setInterval(() => {
          countdown--;
          timerEl.textContent = `(${countdown}s)`;

          if (countdown <= 0) {
            clearInterval(timerInterval);
            resendBtn.disabled = false;
            timerEl.textContent = "";
          }
        }, 1000);
      }

      // Show status overlay
      function showStatus(type, title, message, redirectUrl = null) {
        const overlay = document.getElementById("statusOverlay");
        const iconContainer = document.getElementById("statusIcon");
        const titleEl = document.getElementById("statusTitle");
        const messageEl = document.getElementById("statusMessage");

        if (type === "success") {
          overlay.className = "status-overlay success";
          iconContainer.innerHTML = `
                    <svg class="checkmark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 52">
                        <circle class="checkmark__circle" cx="26" cy="26" r="25" fill="none"/>
                        <path class="checkmark__check" fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8"/>
                    </svg>
                `;
        } else {
          overlay.className = "status-overlay error";
          iconContainer.innerHTML = `
                    <div class="error-x">
                        <i class="fas fa-times"></i>
                    </div>
                `;
        }

        titleEl.textContent = title;
        messageEl.textContent = message;

        overlay.classList.add("active");

        if (redirectUrl) {
          setTimeout(() => {
            window.location.href = redirectUrl;
          }, 2500);
        }
      }

      // Hide status overlay
      function hideStatus() {
        const overlay = document.getElementById("statusOverlay");
        overlay.classList.remove("active");
      }

      // Handle OTP verification
      async function handleVerifyOTP() {
        const otp = getOTPValue();
        const inputs = document.querySelectorAll(".otp-input");

        // Validation
        if (otp.length !== 6) {
          inputs.forEach((input) => {
            if (!input.value) {
              input.classList.add("error");
            }
          });
          document.getElementById("otpError").classList.remove("hidden");

          const card = document.getElementById("otpCard");
          card.classList.add("error-shake");
          setTimeout(() => card.classList.remove("error-shake"), 500);

          showToast("Please enter all 6 digits", "error");
          return;
        }

        const btn = document.getElementById("verifyBtn");
        const btnText = document.getElementById("verifyBtnText");
        const spinner = document.getElementById("verifySpinner");

        btn.disabled = true;
        btnText.textContent = "Verifying...";
        spinner.classList.remove("hidden");

        try {
          const res = await fetch(`${API_URL}/verify-otp`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              email: userEmail,
              otp: otp,
            }),
          });

          const data = await res.json();

          if (res.ok && data.success) {
            // Store token and user data
            if (data.token) {
              localStorage.setItem("token", data.token);
            }
            if (data.user) {
              localStorage.setItem("user", JSON.stringify(data.user));
            }

            // Clear session storage
            sessionStorage.removeItem("pendingEmail");
            sessionStorage.setItem("justLoggedIn", "true");

            showStatus(
              "success",
              "Email Verified!",
              "Your email has been verified. Redirecting to dashboard...",
              "dashboard.html",
            );
          } else {
            showStatus(
              "error",
              "Invalid Code",
              data.message ||
                "The code you entered is incorrect. Please try again.",
            );
            setTimeout(() => {
              hideStatus();
              clearOTPInputs();
            }, 2000);
          }
        } catch (error) {
          console.error("Verification error:", error);
          showStatus(
            "error",
            "Server Error",
            "Could not connect to server. Please check your internet connection and try again.",
          );
          setTimeout(() => {
            hideStatus();
          }, 2000);
        }

        btn.disabled = false;
        btnText.textContent = "Verify Code";
        spinner.classList.add("hidden");
      }

      // Handle resend OTP
      async function handleResendOTP() {
        const resendBtn = document.getElementById("resendBtn");

        resendBtn.disabled = true;

        try {
          const res = await fetch(`${API_URL}/resend-otp`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              email: userEmail,
            }),
          });

          const data = await res.json();

          if (res.ok && data.success) {
            showToast("New verification code sent to your email!", "success");
            clearOTPInputs();
            startTimer();
          } else {
            showToast(
              data.message || "Failed to resend code. Please try again.",
              "error",
            );
            resendBtn.disabled = false;
          }
        } catch (error) {
          console.error("Resend error:", error);
          showToast("Could not connect to server. Please try again.", "error");
          resendBtn.disabled = false;
        }
      }

      // Allow Enter key to submit
      document.addEventListener("keydown", (e) => {
        if (
          e.key === "Enter" &&
          document.activeElement.classList.contains("otp-input")
        ) {
          handleVerifyOTP();
        }
      });
    </script>
  </body>
</html>
