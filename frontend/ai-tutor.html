<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>AI Tutor | E-Bundle Ethiopia</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+Ethiopic:wght@400;500;700&display=swap"
      rel="stylesheet" />

    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ["Inter", "Noto Sans Ethiopic", "sans-serif"] },
            colors: {
              primary: "#4F46E5",
              secondary: "#7C3AED",
              accent: "#EC4899",
            },
          },
        },
      };
    </script>
    <style>
      .glass {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .glass-card {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .blob {
        position: absolute;
        filter: blur(60px);
        opacity: 0.3;
        z-index: -1;
      }
      .typing-dot {
        animation: typing 1.4s infinite;
      }
      .typing-dot:nth-child(2) {
        animation-delay: 0.2s;
      }
      .typing-dot:nth-child(3) {
        animation-delay: 0.4s;
      }
      @keyframes typing {
        0%,
        60%,
        100% {
          transform: translateY(0);
          opacity: 0.4;
        }
        30% {
          transform: translateY(-10px);
          opacity: 1;
        }
      }
      .fade-in {
        animation: fadeIn 0.5s ease-in;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .nav-btn {
        transition: all 0.2s ease;
      }
      .nav-btn:hover {
        background: rgba(255, 255, 255, 0.1);
        transform: translateY(-1px);
      }
      pre {
        background: rgba(0, 0, 0, 0.3);
        padding: 12px;
        border-radius: 8px;
        overflow-x: auto;
        margin: 10px 0;
      }
      code {
        background: rgba(0, 0, 0, 0.3);
        padding: 2px 6px;
        border-radius: 4px;
        font-family: monospace;
      }
    </style>
  </head>
  <body
    class="antialiased min-h-screen relative selection:bg-primary selection:text-white">
    <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
      <div class="blob bg-primary w-72 h-72 rounded-full top-0 left-0"></div>
      <div
        class="blob bg-secondary w-96 h-96 rounded-full bottom-0 right-0"></div>
    </div>

    <div id="toastContainer" class="fixed top-4 right-4 z-50 space-y-2"></div>

    <!-- Navbar -->
    <nav
      class="w-full glass border-b border-white/10 px-6 py-4 flex justify-between items-center sticky top-0 z-50">
      <div
        class="flex items-center space-x-3 cursor-pointer"
        onclick="window.location.href = 'dashboard.html'">
        <div
          class="w-10 h-10 bg-gradient-to-br from-primary to-secondary rounded-xl flex items-center justify-center">
          <i class="fas fa-graduation-cap text-white text-lg"></i>
        </div>
        <span class="text-xl font-bold hidden sm:block">E-Bundle</span>
      </div>

      <div class="hidden md:flex items-center space-x-1">
        <a
          href="dashboard.html"
          class="nav-btn px-4 py-2 rounded-lg text-gray-300 hover:text-white hover:bg-white/10 transition-all flex items-center space-x-2">
          <i class="fas fa-home"></i><span>Dashboard</span>
        </a>
        <a
          href="library.html"
          class="nav-btn px-4 py-2 rounded-lg text-gray-300 hover:text-white hover:bg-white/10 transition-all flex items-center space-x-2">
          <i class="fas fa-book"></i><span>Library</span>
        </a>
        <a
          href="ai-tutor.html"
          class="nav-btn px-4 py-2 rounded-lg text-white bg-white/10 transition-all flex items-center space-x-2">
          <i class="fas fa-robot"></i><span>AI Tutor</span>
        </a>
        <a
          href="community.html"
          class="nav-btn px-4 py-2 rounded-lg text-gray-300 hover:text-white hover:bg-white/10 transition-all flex items-center space-x-2">
          <i class="fas fa-users"></i><span>Community</span>
        </a>
        <a
          href="kahoot.html"
          class="nav-btn px-4 py-2 rounded-lg text-gray-300 hover:text-white hover:bg-white/10 transition-all flex items-center space-x-2">
          <i class="fas fa-gamepad"></i><span>Kahoot</span>
        </a>
        <a
          href="video-chat.html"
          class="nav-btn px-4 py-2 rounded-lg text-gray-300 hover:text-white hover:bg-white/10 transition-all flex items-center space-x-2">
          <i class="fas fa-video"></i><span>Video Chat</span>
        </a>
      </div>

      <div class="flex items-center space-x-4">
        <div
          class="hidden sm:flex items-center space-x-2 bg-white/5 px-3 py-1.5 rounded-full border border-white/10">
          <i class="fas fa-fire text-orange-500"></i>
          <span class="text-sm font-semibold" id="streakDisplay"
            >0 Day Streak</span
          >
        </div>
        <div class="relative group">
          <div
            class="w-10 h-10 rounded-full bg-gradient-to-r from-primary to-secondary p-[2px] cursor-pointer">
            <img
              src="https://api.dicebear.com/7.x/avataaars/svg?seed=User"
              class="w-full h-full rounded-full bg-slate-900" />
          </div>
          <div
            class="absolute right-0 mt-2 w-48 glass rounded-xl border border-white/10 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all transform origin-top-right z-50">
            <div class="p-2">
              <div
                class="px-4 py-2 text-sm text-gray-400 border-b border-white/10 mb-1">
                <span id="userName">User</span>
              </div>
              <a
                href="profile.html"
                class="w-full text-left px-4 py-2 hover:bg-white/10 rounded-lg text-sm transition-colors block"
                >Profile</a
              >
              <a
                href="settings.html"
                class="w-full text-left px-4 py-2 hover:bg-white/10 rounded-lg text-sm transition-colors block"
                >Settings</a
              >
              <hr class="border-white/10 my-2" />
              <a
                href="index.html"
                class="w-full text-left px-4 py-2 hover:bg-red-500/20 text-red-400 rounded-lg text-sm transition-colors block"
                onclick="localStorage.removeItem('token')"
                >Logout</a
              >
            </div>
          </div>
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="p-6 max-w-7xl mx-auto relative z-10 h-[calc(100vh-5rem)]">
      <section class="fade-in h-full">
        <div
          class="h-full flex flex-col glass-card rounded-3xl overflow-hidden">
          <div
            class="p-6 border-b border-white/10 bg-gradient-to-r from-primary/20 to-secondary/20">
            <div class="flex items-center space-x-4">
              <div
                class="w-12 h-12 bg-gradient-to-br from-primary to-secondary rounded-2xl flex items-center justify-center animate-pulse">
                <i class="fas fa-robot text-white text-xl"></i>
              </div>
              <div>
                <h2 class="text-xl font-bold">AI Learning Assistant</h2>
                <p class="text-sm text-gray-400">
                  Ask anything about your studies
                </p>
              </div>
              <div class="ml-auto flex items-center space-x-2">
                <span
                  class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                <span class="text-xs text-green-400">Online</span>
              </div>
            </div>
          </div>

          <div id="aiChatMessages" class="flex-1 overflow-y-auto p-6 space-y-4">
            <!-- Messages loaded here -->
          </div>

          <div class="p-4 border-t border-white/10 bg-slate-900/50">
            <div class="flex flex-wrap gap-2 mb-3">
              <button
                onclick="quickAsk('Explain quadratic equations')"
                class="px-3 py-1.5 bg-white/5 hover:bg-white/10 rounded-full text-xs transition-colors border border-white/10">
                Quadratic equations?
              </button>
              <button
                onclick="quickAsk('Help with photosynthesis')"
                class="px-3 py-1.5 bg-white/5 hover:bg-white/10 rounded-full text-xs transition-colors border border-white/10">
                Photosynthesis?
              </button>
              <button
                onclick="quickAsk('Newton laws of motion')"
                class="px-3 py-1.5 bg-white/5 hover:bg-white/10 rounded-full text-xs transition-colors border border-white/10">
                Newton's laws?
              </button>
              <button
                onclick="quickAsk('Periodic table trends')"
                class="px-3 py-1.5 bg-white/5 hover:bg-white/10 rounded-full text-xs transition-colors border border-white/10">
                Periodic table?
              </button>
              <button
                onclick="quickAsk('Ethiopian history')"
                class="px-3 py-1.5 bg-white/5 hover:bg-white/10 rounded-full text-xs transition-colors border border-white/10">
                Ethiopian history?
              </button>
            </div>
            <div class="flex space-x-3">
              <input
                type="text"
                id="aiChatInput"
                placeholder="Ask your question..."
                class="flex-1 px-4 py-3 bg-white/5 border border-white/10 rounded-xl focus:outline-none focus:border-primary text-white disabled:opacity-50 disabled:cursor-not-allowed"
                onkeypress="if (event.key === 'Enter') sendMessage();" />
              <button
                id="sendBtn"
                onclick="sendMessage()"
                disabled
                class="px-6 py-3 bg-primary rounded-xl hover:bg-primary/80 transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center min-w-[60px]">
                <i class="fas fa-paper-plane" id="sendIcon"></i>
                <svg
                  id="sendSpinner"
                  class="hidden w-5 h-5 animate-spin"
                  xmlns="http://www.w3.org/2000/svg"
                  fill="none"
                  viewBox="0 0 24 24">
                  <circle
                    class="opacity-25"
                    cx="12"
                    cy="12"
                    r="10"
                    stroke="currentColor"
                    stroke-width="4"></circle>
                  <path
                    class="opacity-75"
                    fill="currentColor"
                    d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
              </button>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script>
      // FIXED: Use relative path instead of absolute URL
      const API_URL = "/api/chat";
      let isWaitingForResponse = false;
      let authToken = null;

      // Check for auth token on load
      document.addEventListener("DOMContentLoaded", async () => {
        // Get token from localStorage (set during login)
        authToken = localStorage.getItem("token");

        if (!authToken) {
          showToast("Please log in to use the AI Tutor", "error");
          document.getElementById("aiChatInput").disabled = true;
          document.getElementById("sendBtn").disabled = true;
          setTimeout(() => {
            window.location.href = "login.html";
          }, 2000);
          return;
        }

        // Load user info
        try {
          const response = await fetch("/profile", {
            headers: {
              Authorization: `Bearer ${authToken}`,
            },
          });
          if (response.ok) {
            const data = await response.json();
            if (data.success && data.user) {
              document.getElementById("userName").innerHTML =
                data.user.firstName || "User";
              const streak = data.user.streak || 0;
              document.getElementById("streakDisplay").innerHTML =
                `${streak} Day Streak`;
            }
          }
        } catch (err) {
          console.error("Failed to load user info:", err);
        }

        // Enable input
        document.getElementById("aiChatInput").disabled = false;
        document.getElementById("sendBtn").disabled = false;

        addMessage(
          "Hello! I'm your AI tutor powered by Groq. I can help you with Mathematics, Physics, Chemistry, Biology, English, History, and more. What would you like to learn today?",
        );
      });

      function showToast(message, type = "info") {
        const container = document.getElementById("toastContainer");
        const toast = document.createElement("div");
        const colors =
          type === "error" ? "bg-red-500/20 border-red-500/50 text-red-400"
          : type === "success" ?
            "bg-green-500/20 border-green-500/50 text-green-400"
          : "bg-primary/20 border-primary/50 text-primary";
        toast.className = `px-4 py-3 rounded-xl glass border ${colors} text-sm flex items-center space-x-2 transform translate-x-full transition-transform duration-300`;
        toast.innerHTML = `<i class="fas ${
          type === "error" ? "fa-exclamation-circle"
          : type === "success" ? "fa-check-circle"
          : "fa-info-circle"
        }"></i><span>${message}</span>`;
        container.appendChild(toast);
        setTimeout(() => toast.classList.remove("translate-x-full"), 10);
        setTimeout(() => {
          toast.classList.add("translate-x-full");
          setTimeout(() => toast.remove(), 300);
        }, 3000);
      }

      function quickAsk(question) {
        document.getElementById("aiChatInput").value = question;
        sendMessage();
      }

      function setLoadingState(loading) {
        const btn = document.getElementById("sendBtn");
        const icon = document.getElementById("sendIcon");
        const spinner = document.getElementById("sendSpinner");
        const input = document.getElementById("aiChatInput");

        isWaitingForResponse = loading;
        btn.disabled = loading;

        if (loading) {
          icon.classList.add("hidden");
          spinner.classList.remove("hidden");
          input.disabled = true;
        } else {
          icon.classList.remove("hidden");
          spinner.classList.add("hidden");
          input.disabled = false;
          input.focus();
        }
      }

      async function sendMessage() {
        const input = document.getElementById("aiChatInput");
        const text = input.value.trim();

        if (!text || isWaitingForResponse) return;

        // Check auth
        if (!authToken) {
          showToast("Please log in first", "error");
          return;
        }

        addMessage(text, "user");
        input.value = "";
        setLoadingState(true);
        showTyping();

        try {
          console.log("Sending request to:", API_URL);
          console.log("Token exists:", !!authToken);

          const response = await fetch(API_URL, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${authToken}`,
            },
            body: JSON.stringify({ message: text }),
          });

          console.log("Response status:", response.status);
          removeTyping();

          if (response.status === 401) {
            showToast("Session expired. Please log in again.", "error");
            localStorage.removeItem("token");
            setTimeout(() => {
              window.location.href = "login.html";
            }, 1500);
            return;
          }

          if (!response.ok) {
            const errorData = await response.json().catch(() => ({}));
            console.error("Error response:", errorData);
            throw new Error(
              errorData.error || `HTTP error! status: ${response.status}`,
            );
          }

          const data = await response.json();
          console.log("Success response:", data);

          if (data.success) {
            addMessage(data.response, "ai");
          } else {
            throw new Error(data.error || "Unknown error");
          }
        } catch (error) {
          removeTyping();
          console.error("Chat error:", error);
          let errorMessage = error.message;
          if (error.message === "Failed to fetch") {
            errorMessage =
              "Cannot connect to the server. Please check if the backend is running.";
          }
          addMessage(
            `I apologize, but I'm having trouble connecting right now.\n\n**Error:** ${errorMessage}\n\nPlease try again or contact support if the problem persists.`,
            "ai",
          );
          showToast("Connection error: " + errorMessage, "error");
        } finally {
          setLoadingState(false);
        }
      }

      function showTyping() {
        const container = document.getElementById("aiChatMessages");
        const typing = document.createElement("div");
        typing.id = "typingIndicator";
        typing.className = "flex items-start space-x-4";
        typing.innerHTML = `
                <div class="w-10 h-10 bg-gradient-to-br from-primary to-secondary rounded-xl flex items-center justify-center flex-shrink-0">
                    <i class="fas fa-robot text-white"></i>
                </div>
                <div class="glass p-4 rounded-2xl">
                    <div class="flex space-x-1">
                        <div class="w-2 h-2 bg-gray-400 rounded-full typing-dot"></div>
                        <div class="w-2 h-2 bg-gray-255 rounded-full typing-dot"></div>
                        <div class="w-2 h-2 bg-gray-400 rounded-full typing-dot"></div>
                    </div>
                </div>
            `;
        container.appendChild(typing);
        container.scrollTop = container.scrollHeight;
      }

      function removeTyping() {
        const typing = document.getElementById("typingIndicator");
        if (typing) typing.remove();
      }

      function formatMarkdown(text) {
        // Convert **text** to bold
        text = text.replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");
        // Convert *text* to italic (but not bullet points)
        text = text.replace(/(?<!\*)\*(?!\*)(.*?)\*(?!\*)/g, "<em>$1</em>");
        // Convert `code` to inline code
        text = text.replace(/`([^`]+)`/g, "<code>$1</code>");
        // Convert ```code blocks```
        text = text.replace(/```([\s\S]*?)```/g, "<pre><code>$1</code></pre>");
        // Convert newlines to <br> (but not inside pre blocks)
        text = text
          .split("<pre>")
          .map((part, index) => {
            if (index % 2 === 0) {
              return part.replace(/\n/g, "<br>");
            }
            return part;
          })
          .join("<pre>");
        return text;
      }

      function addMessage(message, sender) {
        const container = document.getElementById("aiChatMessages");
        const wrapper = document.createElement("div");
        wrapper.className = `flex items-start space-x-4 ${sender === "ai" ? "" : "justify-end"}`;

        const avatarHtml =
          sender === "ai" ?
            `<div class="w-10 h-10 bg-gradient-to-br from-primary to-secondary rounded-xl flex items-center justify-center flex-shrink-0"><i class="fas fa-robot text-white"></i></div>`
          : `<div class="w-10 h-10 bg-slate-700 rounded-full flex items-center justify-center flex-shrink-0"><i class="fas fa-user text-white"></i></div>`;

        const messageContent =
          sender === "ai" ? formatMarkdown(message) : message;

        wrapper.innerHTML = `
                ${sender === "ai" ? avatarHtml : ""}
                <div class="glass p-4 rounded-2xl max-w-2xl ${sender === "ai" ? "markdown-body" : "bg-primary/20"}">
                    <div class="text-sm leading-relaxed">${messageContent}</div>
                </div>
                ${sender === "user" ? avatarHtml : ""}
            `;
        container.appendChild(wrapper);
        container.scrollTop = container.scrollHeight;
      }
    </script>
  </body>
</html>
